<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 7 Thai Practice</title>
<style>
  :root{
    --navy:#1a1a2e;
    --green:#2e7d32;
    --red:#c62828;
    --orange:#f57c00;
    --page:#f5f6fa;
    --card:#ffffff;
    --text:#1a1a2e;
    --muted:#5a5a6e;
    --shadow:0 2px 8px rgba(0,0,0,.08);
    /* topic colors */
    --t0:#1565c0; --t1:#6a1b9a; --t2:#00838f; --t3:#ad1457;
    --t4:#2e7d32; --t5:#e65100; --t6:#4527a0; --t7:#00695c; --t8:#c2185b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
    background:var(--page);color:var(--text);line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:520px;margin:0 auto;padding:18px 14px 60px;position:relative}
  .ver{position:absolute;top:10px;right:14px;font-size:12px;color:var(--muted);font-weight:600}
  h1{font-size:26px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 18px}
  .pill{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;
    background:#fff;border:1.5px solid;line-height:1.2}
  .card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
  .stats{display:flex;gap:14px;margin-bottom:14px}
  .stat{flex:1;text-align:center}
  .stat .num{font-size:30px;font-weight:800;line-height:1}
  .stat .lbl{font-size:12px;color:var(--muted);margin-top:4px;font-weight:600}
  .bar{height:9px;border-radius:6px;background:#e6e8f0;overflow:hidden;margin:6px 0 4px}
  .bar > i{display:block;height:100%;background:var(--navy);width:0;border-radius:6px;
    transition:width .8s cubic-bezier(.4,0,.2,1)}
  .howto{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.45}
  .btns{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  button{font-family:inherit;cursor:pointer;border:none;font-weight:700}
  .btn-primary{background:var(--navy);color:#fff;padding:15px;border-radius:10px;font-size:16px;width:100%;
    transition:transform .12s,opacity .12s}
  .btn-primary:active{transform:scale(.985)}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed}
  .btn-secondary{background:#fff;color:var(--red);border:1.5px solid var(--red);padding:12px;border-radius:10px;
    font-size:14px;width:100%}
  .sec-title{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 10px}
  .topics{display:grid;grid-template-columns:1fr;gap:10px}
  .topics.two{grid-template-columns:1fr 1fr}
  .trow{background:var(--card);border-radius:10px;box-shadow:var(--shadow);padding:13px 14px}
  .trow .tname{font-size:14px;font-weight:800;margin-bottom:7px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .half{color:var(--orange);font-weight:800;font-size:12.5px}
  .tcount{font-size:11.5px;color:var(--muted);font-weight:700;margin-left:auto}
  .tbar{height:7px;border-radius:5px;background:#e6e8f0;overflow:hidden}
  .tbar > i{display:block;height:100%;width:0;border-radius:5px;transition:width .8s cubic-bezier(.4,0,.2,1)}

  /* quiz screen */
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .qbadge{font-size:11.5px;font-weight:800;padding:5px 11px;border-radius:999px;background:#fff;border:1.5px solid;line-height:1.2}
  .qcount{font-size:13px;font-weight:700;color:var(--muted)}
  .qtext{font-size:19px;font-weight:700;text-align:center;line-height:1.45;margin:8px 4px 16px}
  .hintbtn{background:#fff;border:1.5px dashed #b9bdd0;color:var(--muted);font-size:13px;
    padding:9px;border-radius:9px;width:100%;margin-bottom:14px}
  .hintbox{background:#fff7ec;border:1px solid #ffd9a8;border-radius:9px;padding:11px 13px;
    font-size:13.5px;color:#8a5400;margin-bottom:14px;line-height:1.45}
  .fpnote{background:#eef0fb;border:1.5px solid var(--navy);border-radius:9px;padding:10px 13px;
    font-size:13px;color:var(--navy);margin-bottom:14px;line-height:1.45;font-weight:600;text-align:center}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{background:#fff;border:1.5px solid #d8dbe8;border-radius:10px;padding:13px 15px;font-size:15px;
    text-align:left;width:100%;transition:background .15s,border-color .15s;color:var(--text);font-weight:600;line-height:1.4}
  .opt:active{background:#f0f1f7}
  .opt.correct{background:#e7f4e8;border-color:var(--green);color:var(--green)}
  .opt.wrong{background:#fbe9e9;border-color:var(--red);color:var(--red)}
  .opt:disabled{cursor:default}
  .explain{background:#f0f1f7;border-radius:9px;padding:12px 14px;font-size:13.5px;margin-top:16px;line-height:1.5}
  .insight{border:1.5px solid var(--navy);background:#f7f8fc;border-radius:9px;padding:12px 14px;
    font-size:13.5px;margin-top:11px;line-height:1.5}
  .insight b{color:var(--navy)}
  .next{background:var(--navy);color:#fff;padding:15px;border-radius:10px;font-size:16px;width:100%;margin-top:18px}

  /* results */
  .score{font-size:42px;font-weight:800;text-align:center;line-height:1}
  .score small{font-size:16px;color:var(--muted);font-weight:700}
  .badge{background:#e7f4e8;color:var(--green);border-radius:9px;padding:11px;text-align:center;
    font-weight:800;font-size:14px;margin:14px 0}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13.5px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid #ececf3}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  td.n{text-align:center;font-weight:700}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,20,40,.55);display:none;align-items:center;
    justify-content:center;padding:24px;z-index:50}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:24px 22px;max-width:340px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.25)}
  .modal h3{font-size:18px;margin-bottom:8px}
  .modal p{font-size:14px;color:var(--muted);margin-bottom:18px}
  .modal .mbtns{display:flex;gap:10px}
  .modal .mbtns button{flex:1;padding:12px;border-radius:9px;font-size:14px}
  .mcancel{background:#eceef5;color:var(--text)}
  .mconfirm{background:var(--red);color:#fff}
  .hide{display:none}
  @media(max-width:380px){
    .qtext{font-size:17px}.opt{font-size:14px;padding:12px 13px}
    .trow{padding:11px}.stat .num{font-size:26px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="ver" id="ver">ver2.05</div>

  <!-- HOME -->
  <div id="home">
    <h1>Grade 7 Thai Practice</h1>
    <div class="pills" id="pills"></div>

    <div class="card">
      <div class="stats">
        <div class="stat"><div class="num" id="activeN">0</div><div class="lbl">Active Questions</div></div>
        <div class="stat"><div class="num" id="masteredN">0</div><div class="lbl">Completed</div></div>
      </div>
      <div class="bar"><i id="homeBar"></i></div>
      <div class="howto" id="howto"></div>
    </div>

    <div class="btns">
      <button class="btn-primary" id="continueBtn">▶ Continue Progress</button>
      <button class="btn-secondary" id="resetBtn">↺ Start All Over</button>
    </div>

    <div class="sec-title">Topics</div>
    <div class="topics" id="topics"></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hide">
    <div class="qhead">
      <span class="qbadge" id="qbadge"></span>
      <span class="qcount" id="qcount"></span>
    </div>
    <div class="qtext" id="qtext"></div>
    <button class="hintbtn" id="hintbtn">💡 Show hint</button>
    <div class="fpnote hide" id="finalPassNote">🎯 Final check — no hint this time. Answer from memory to complete this question.</div>
    <div class="hintbox hide" id="hintbox"></div>
    <div class="opts" id="opts"></div>
    <div id="postAnswer" class="hide">
      <div class="explain" id="explain"></div>
      <div class="insight" id="insight"></div>
      <button class="next" id="nextBtn">Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="hide">
    <h1>Round Complete</h1>
    <div class="card">
      <div class="score" id="scoreLine"></div>
      <div class="badge hide" id="completeBadge"></div>
      <table>
        <thead><tr><th>Topic</th><th class="n">Correct</th><th class="n">Seen</th></tr></thead>
        <tbody id="resTable"></tbody>
      </table>
    </div>
    <button class="btn-primary" id="backHome">Continue Studying →</button>
  </div>
</div>

<!-- RESET MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Start all over?</h3>
    <p>This will erase all your progress. Are you sure?</p>
    <div class="mbtns">
      <button class="mcancel" id="mCancel">Cancel</button>
      <button class="mconfirm" id="mConfirm">Confirm</button>
    </div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
var QUIZ_NAME = "Grade 7 Thai Practice";
var QS_PER_ROUND = 10;
var STREAK_TO_MASTER = 2;

var LS_KEY = "grade-7-thai-practice_v1";

/* ============ QUESTION BANK ============ */
var BANK = [
  /* ===== ราชาธิราช (t0) — 12 ===== */
  {t:"ราชาธิราช",k:"hb38ed858",q:"ราชาธิราชแปลมาจากพงศาวดารของชาติใด",
   o:["พงศาวดารมอญ","นิทานพื้นบ้าน","ศิลาจารึกเขมร","พงศาวดารจีน"],a:0,
   h:"เป็นเรื่องของชนชาติมอญ",
   expl:"ราชาธิราชแปลมาจากพงศาวดารมอญ",
   insight:"ราชาธิราชมาจากพงศาวดารมอญ"},
  {t:"ราชาธิราช",k:"k_raja_01",q:"ใครเป็นผู้แปลและเรียบเรียงเรื่องราชาธิราช",
   o:["เจ้าพระยาพระคลัง (หน)","พระมหาเทวีเจ้า","พระยาอินทรอัคคะราช","รัชกาลที่ ๖"],a:0,
   h:"ขุนนางคนสำคัญสมัยรัชกาลที่ ๑",
   expl:"รัชกาลที่ ๑ ให้เจ้าพระยาพระคลัง (หน) เป็นหัวหน้าผู้แปล",
   insight:"ผู้แปลคือเจ้าพระยาพระคลัง (หน)"},
  {t:"ราชาธิราช",k:"k_raja_02",q:"จุดประสงค์ของการแต่งเรื่องราชาธิราชคืออะไร",
   o:["เพื่อจดจำไว้เป็นคติบำรุงสติปัญญา","เพื่อเป็นแนวทางการทำศึกสงคราม","เพื่อเป็นแบบอย่างการปกครอง","เพื่อสั่งสอนประชาชน"],a:0,
   h:"เกี่ยวกับการบำรุงปัญญา",
   expl:"จุดประสงค์คือจดจำไว้เป็นคติบำรุงสติปัญญา",

  {t:"ราชาธิราช",k:"h1bf96220",q:"ตอนที่นักเรียนเรียนในเรื่องราชาธิราชคือตอนใด",
   o:["สมิงพระรามอาสา","กำเนิดมะกะโท","ศึกถลาง","พลายงามรบ"],a:0,
   h:"ชื่อตอนตรงกับชื่อตัวเอก",
   expl:"ตอนที่เรียนคือ สมิงพระรามอาสา",
   insight:"เรียนตอนสมิงพระรามอาสา"},
  {t:"ราชาธิราช",k:"k_raja_04",q:"ทหารเอกของพระเจ้ากรุงจีนที่สมิงพระรามต้องสู้ด้วยชื่ออะไร",

   h:"เขาห่วงบ้านเมืองหงสาวดีของตน",

   h:"เป็นจุดที่สมิงพระรามเล็งโจมตี",

  {t:"ราชาธิราช",k:"k_raja_09",q:"กามะนีพ่ายแพ้เพราะกลอุบายใดของสมิงพระราม",

   h:"เป็นการล่อให้ม้าฝ่ายตรงข้ามหมดแรง",

  {t:"ชนิดและหน้าที่ของคำ",k:"h92f7f69d",q:"\"ฝูง\" ใน \"ฝูงนก\" เป็นคำนามชนิดใด",

      // carry progress: for each old index entry, map to its content key, then to any current q with same k
      var keyToCur={};
      BANK.forEach(function(q){ keyToCur[q.k]=q.k; });
      Object.keys(p.ledger).forEach(function(idx){
        var ck = OLD_INDEX_TO_KEY[idx];
        if(ck && keyToCur[ck]){
          migrated[ck] = p.ledger[idx];
        }
      });
      var ns={ledger:migrated, v:2};
      return ns;
    }
    // already v2: ensure every current question has an entry
    BANK.forEach(function(q){
      if(!p.ledger[q.k]) p.ledger[q.k]={streak:0,status:"active",lastCorrect:0};
    });
    return p;
  }catch(e){ return freshState(); }
}
function save(){
  try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(e){}
}

/* ============ SESSION ============ */
var session=null;

function eligibleIds(){
  var now=Date.now();
  return BANK.filter(function(q){
    var l=state.ledger[q.k];
    if(l.status!=="active") return false;
    if(STREAK_TO_MASTER>1 && l.streak===STREAK_TO_MASTER-1 && FINAL_PASS_SPACING_MS>0){
      return (now - l.lastCorrect) >= FINAL_PASS_SPACING_MS;
    }
    return true;
  }).map(function(q){return q.id;});
}

function buildSession(){
  var pool=eligibleIds();
  // relief valve: if not enough eligible, allow spacing-blocked actives too
  if(pool.length < QS_PER_ROUND){
    var extra=BANK.filter(function(q){
      return state.ledger[q.k].status==="active" && pool.indexOf(q.id)<0;
    }).map(function(q){return q.id;});
    pool=pool.concat(extra);
  }
  shuffle(pool);
  var take=Math.min(QS_PER_ROUND,pool.length);
  var ids=pool.slice(0,take);
  session={ids:ids,idx:0,correct:0,completedThisRound:0,
    perTopic:{},answered:false};
  return ids.length;
}

function shuffle(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

/* ============ NAVIGATION ============ */
var elHome=document.getElementById("home"),
    elQuiz=document.getElementById("quiz"),
    elResults=document.getElementById("results");

function showScreen(s){
  elHome.classList.add("hide");elQuiz.classList.add("hide");elResults.classList.add("hide");
  s.classList.remove("hide");
  window.scrollTo(0,0);
}

/* ============ HOME RENDER ============ */
function totals(){
  var mastered=0,active=0,total=BANK.length;
  BANK.forEach(function(q){
    if(state.ledger[q.k].status==="mastered") mastered++; else active++;
  });
  return {mastered:mastered,active:active,total:total};
}
function topicStats(t){
  var total=0,mastered=0,half=0;
  BANK.forEach(function(q){
    if(q.t!==t) return;
    total++;
    var l=state.ledger[q.k];
    if(l.status==="mastered") mastered++;
    else if(l.streak>=1) half++;
  });
  return {total:total,mastered:mastered,half:half};
}

function renderHome(){
  // pills
  var pills=document.getElementById("pills");pills.innerHTML="";
  TOPIC_ORDER.forEach(function(t){
    var c=TOPIC_COLOR[t];
    var span=document.createElement("span");
    span.className="pill";
    span.style.borderColor=c;span.style.color=c;
    span.textContent=t;
    pills.appendChild(span);
  });
  // stats
  var tt=totals();
  document.getElementById("activeN").textContent=tt.active;
  document.getElementById("masteredN").textContent=tt.mastered;
  var pct=tt.total?Math.round(tt.mastered/tt.total*100):0;
  setTimeout(function(){document.getElementById("homeBar").style.width=pct+"%";},60);
  document.getElementById("howto").innerHTML=
    "Answer correctly <b>"+STREAK_TO_MASTER+"</b> times in a row to complete a question. "+
    "A wrong answer resets your progress on that question. Work through all <b>"+tt.total+"</b> questions to finish.";

  // continue button disable if all mastered
  document.getElementById("continueBtn").disabled = (tt.active===0);

  // topics
  var box=document.getElementById("topics");box.innerHTML="";
  box.className="topics"+(TOPIC_ORDER.length>=7?" two":"");
  TOPIC_ORDER.forEach(function(t){
    var s=topicStats(t),c=TOPIC_COLOR[t];
    var pctT=s.total?Math.round(s.mastered/s.total*100):0;
    var row=document.createElement("div");row.className="trow";
    var half=s.half>0?'<span class="half" title="One more correct answer to complete these">▶'+s.half+'</span>':'';
    row.innerHTML=
      '<div class="tname" style="color:'+c+'">'+t+half+
      '<span class="tcount">'+s.mastered+'/'+s.total+'</span></div>'+
      '<div class="tbar"><i style="background:'+c+'"></i></div>';
    box.appendChild(row);
    var bar=row.querySelector(".tbar > i");
    setTimeout(function(){bar.style.width=pctT+"%";},60);
  });
}

/* ============ QUIZ RENDER ============ */
function startRound(){
  var n=buildSession();
  if(n===0){ renderHome(); showScreen(elHome); return; }
  renderQuestion();
  showScreen(elQuiz);
}

function renderQuestion(){
  session.answered=false;
  var q=BANK[byId(session.ids[session.idx])];
  var c=TOPIC_COLOR[q.t];
  var badge=document.getElementById("qbadge");
  badge.textContent=q.t;badge.style.borderColor=c;badge.style.color=c;
  document.getElementById("qcount").textContent="Q "+(session.idx+1)+" of "+session.ids.length;
  document.getElementById("qtext").textContent=q.q;

  // hint — disabled on the final pass before a question is retired (recall check)
  var l=state.ledger[q.k];
  var isFinalPass=(STREAK_TO_MASTER>1 && l.streak===STREAK_TO_MASTER-1);
  var hb=document.getElementById("hintbox");
  var hbtn=document.getElementById("hintbtn");
  var fpNote=document.getElementById("finalPassNote");
  if(isFinalPass){
    hb.classList.add("hide");hb.textContent="";
    hbtn.classList.add("hide");
    fpNote.classList.remove("hide");
  }else{
    hbtn.classList.remove("hide");
    hbtn.textContent="💡 Show hint";
    hb.classList.add("hide");hb.textContent=q.h;
    fpNote.classList.add("hide");
  }

  // options (shuffle at render)
  var opts=document.getElementById("opts");opts.innerHTML="";
  var order=q.o.map(function(_,i){return i;});
  shuffle(order);
  order.forEach(function(oi){
    var b=document.createElement("button");
    b.className="opt";b.textContent=q.o[oi];
    b.onclick=function(){answer(oi,b);};
    b.setAttribute("data-oi",oi);
    opts.appendChild(b);
  });

  document.getElementById("postAnswer").classList.add("hide");
}

function byId(id){
  for(var i=0;i<BANK.length;i++) if(BANK[i].id===id) return i;
  return 0;
}

function answer(chosen,btnEl){
  if(session.answered) return;
  session.answered=true;
  var q=BANK[byId(session.ids[session.idx])];
  var l=state.ledger[q.k];
  var correct=(chosen===q.a);

  // per-topic tally
  if(!session.perTopic[q.t]) session.perTopic[q.t]={correct:0,drawn:0};
  session.perTopic[q.t].drawn++;

  if(correct){
    session.correct++;
    session.perTopic[q.t].correct++;
    l.streak++;
    l.lastCorrect=Date.now();
    if(l.streak>=STREAK_TO_MASTER && l.status!=="mastered"){
      l.status="mastered";
      session.completedThisRound++;
    }
  }else{
    l.streak=0;
  }
  save(); // immediate persistence

  // highlight
  var buttons=document.querySelectorAll(".opt");
  buttons.forEach(function(b){
    b.disabled=true;
    var oi=parseInt(b.getAttribute("data-oi"),10);
    if(oi===q.a) b.classList.add("correct");
    else if(oi===chosen && !correct) b.classList.add("wrong");
  });

  document.getElementById("hintbtn").classList.add("hide");
  document.getElementById("hintbox").classList.add("hide");
  document.getElementById("finalPassNote").classList.add("hide");
  document.getElementById("explain").innerHTML="<b>"+(correct?"ถูกต้อง ✓":"ยังไม่ถูก ✗")+"</b> — "+q.expl;
  document.getElementById("insight").innerHTML="<b>จำให้แม่น:</b> "+q.insight;
  document.getElementById("postAnswer").classList.remove("hide");
}

document.getElementById("nextBtn").onclick=function(){
  session.idx++;
  if(session.idx>=session.ids.length){ renderResults(); }
  else{ renderQuestion(); window.scrollTo(0,0); }
};

document.getElementById("hintbtn").onclick=function(){
  var hb=document.getElementById("hintbox");
  if(hb.classList.contains("hide")){hb.classList.remove("hide");this.textContent="💡 Hide hint";}
  else{hb.classList.add("hide");this.textContent="💡 Show hint";}
};

/* ============ RESULTS ============ */
function renderResults(){
  document.getElementById("scoreLine").innerHTML=
    session.correct+" <small>/ "+session.ids.length+" correct</small>";
  var badge=document.getElementById("completeBadge");
  if(session.completedThisRound>0){
    badge.classList.remove("hide");
    badge.textContent="✓ "+session.completedThisRound+" question"+(session.completedThisRound>1?"s":"")+" completed this session";
  }else badge.classList.add("hide");

  var tb=document.getElementById("resTable");tb.innerHTML="";
  TOPIC_ORDER.forEach(function(t){
    var p=session.perTopic[t];
    if(!p) return;
    var c=TOPIC_COLOR[t];
    var tr=document.createElement("tr");
    tr.innerHTML='<td style="color:'+c+';font-weight:700">'+t+'</td>'+
      '<td class="n">'+p.correct+'</td><td class="n">'+p.drawn+'</td>';
    tb.appendChild(tr);
  });
  showScreen(elResults);
}

document.getElementById("backHome").onclick=function(){
  renderHome();showScreen(elHome);
};
document.getElementById("continueBtn").onclick=function(){ startRound(); };

/* ============ RESET MODAL ============ */
var overlay=document.getElementById("overlay");
document.getElementById("resetBtn").onclick=function(){overlay.classList.add("show");};
document.getElementById("mCancel").onclick=function(){overlay.classList.remove("show");};
document.getElementById("mConfirm").onclick=function(){
  try{localStorage.removeItem(LS_KEY);}catch(e){}
  state=freshState();save();
  overlay.classList.remove("show");
  renderHome();showScreen(elHome);
};

/* ============ INIT ============ */
renderHome();
showScreen(elHome);
</script>
</body>
</html>
