q(1,"Excel","In Microsoft Excel, what is a cell?",
["A type of formula","The rectangular box where a row and column intersect","The name of a worksheet","A type of chart","The toolbar at the top of the screen"],1,
"Think about what you see when you look at the spreadsheet grid.",
"A cell is the individual rectangular box in a spreadsheet formed by the intersection of a row and a column. Each cell can hold text, numbers, or formulas. Cells are identified by their address, such as A1 or B3.",
"Cell = intersection of row and column. Every piece of data in Excel lives in a cell.");

q(1,"Excel","What is a cell address in Excel?",
["The name of the workbook","The identifying name of a cell using its column letter and row number, such as B4","The formula used in a cell","The colour of a cell","The size of the cell"],1,
"Think about how Excel labels each unique cell in the grid.",
"A cell address (also called a cell reference) identifies a specific cell using its column letter and row number. For example, B4 means column B, row 4. Cell addresses are used in formulas to reference specific data.",
"Cell address = column letter + row number. Example: A1, B3, C10. Always column first, then row.");

q(1,"Excel","In Excel, what are columns identified by?",
["Numbers (1, 2, 3...)","Colours","Letters (A, B, C...)","Symbols","Roman numerals"],2,
"Look at the top of a spreadsheet and note how the vertical strips are labelled.",
"Columns in Excel run vertically and are identified by letters: A, B, C, and so on. Rows run horizontally and are identified by numbers. This combination allows every cell to have a unique address.",
"Columns = letters (vertical). Rows = numbers (horizontal). Column letter always comes first in a cell address.");

q(1,"Excel","In Excel, what are rows identified by?",
["Letters","Colours","Numbers (1, 2, 3...)","Roman numerals","Symbols"],2,
"Look at the left side of a spreadsheet and note how the horizontal strips are labelled.",
"Rows in Excel run horizontally across the spreadsheet and are numbered 1, 2, 3, and so on down the page. Combined with the column letter, the row number forms the cell address.",
"Rows = numbers (horizontal). Columns = letters (vertical).");

q(1,"Excel","What is the Formula Bar in Excel?",
["A menu at the top of the screen with toolbar icons","The bar along the bottom of the screen","The bar above the spreadsheet where you enter text, numbers, and formulas for a selected cell","A sidebar showing cell colours","A list of all worksheets"],2,
"Think about where in the Excel interface you can see and edit the contents of a cell.",
"The Formula Bar is the long input bar above the spreadsheet grid. It displays the contents of the currently selected cell. You can click on it to type or edit text, numbers, or formulas.",
"Formula Bar = where you see and type cell contents. It is above the grid.");

q(1,"Excel","What is a worksheet in Excel?",
["An entire Excel file","A single page of cells within an Excel workbook","A formula template","A chart in Excel","The formula bar area"],1,
"Think about the tabs you see at the bottom of an Excel file.",
"A worksheet is a single page or tab within an Excel workbook. You can see worksheet tabs at the bottom of the screen. One workbook can contain many worksheets, each with its own grid of cells.",
"Worksheet = one tab/page. Workbook = the whole file with all its worksheets.");

q(1,"Excel","What is an Excel workbook?",
["A single row of cells","A chart created in Excel","An Excel file that contains one or more worksheets","The formula bar","A type of cell format"],2,
"Think of the workbook as the whole document.",
"An Excel workbook is the entire file saved as .xlsx. It can contain multiple worksheets (tabs). When you open Excel and save the file, you are saving a workbook.",
"Workbook = the whole Excel file. Worksheet = individual tab inside the workbook.");

q(2,"Excel","A student wants to add up all numbers in cells A1 through A5 automatically. Which formula should they use?",
["ADD(A1:A5)","TOTAL(A1 to A5)","=SUM(A1:A5)","=COUNT(A1:A5)","PLUS(A1,A5)"],2,
"Excel formulas start with an equals sign. SUM adds a range of cells.",
"The correct formula is =SUM(A1:A5). The equals sign starts every formula in Excel. SUM is a built-in function that adds all numbers in the specified range. The colon means from A1 to A5 inclusive.",
"=SUM(range) is the most commonly used Excel formula. Always start formulas with an equals sign.");

q(2,"Excel","In Excel, what is the purpose of the AutoFill feature?",
["It automatically checks your spelling","It fills adjacent cells with a pattern or repeated content from the original cell","It draws charts automatically","It sums all cells automatically","It connects to the internet to find data"],1,
"Think about dragging the small square handle at the corner of a cell.",
"AutoFill allows you to quickly copy the content of one cell into a range of adjacent cells, or extend a pattern such as 1, 2, 3 or Monday, Tuesday, Wednesday automatically. You drag the fill handle (small square at cell corner) to use it.",
"AutoFill saves time by extending patterns or copying content to many cells at once.");

q(1,"Excel","What are gridlines in Excel?",
["The lines that form the borders of charts","The lines on the spreadsheet that separate the rows and columns visually","The lines in a formula","The lines between worksheets","Decorative borders on the toolbar"],1,
"Look at any spreadsheet. What are the faint lines dividing the cells called?",
"Gridlines are the light horizontal and vertical lines in the spreadsheet that separate the cells visually. They help you read across rows and down columns. They are usually not printed unless you specifically turn on printing of gridlines.",
"Gridlines separate cells visually. They are the faint lines forming the grid in the spreadsheet.");

q(2,"Excel","A student selects cells B2 to D5 by clicking B2 and dragging to D5. What is this action called?",
["Copy and paste","AutoFill","Selecting a range","Formatting","Sorting"],2,
"Think about what it is called when you select multiple cells together.",
"Selecting multiple cells together is called selecting a range. The range B2:D5 includes all cells from B2 to D5. Ranges are used in formulas, formatting, and many other Excel operations.",
"A range is a group of selected cells. Ranges are written as StartCell:EndCell, like B2:D5.");

q(2,"Excel","What does a label in Excel refer to?",
["A formula in a cell","The identifying name or text that describes the data in a row or column","A chart title","A worksheet name","A file name"],1,
"Think about the header row or column that tells you what each row or column contains.",
"A label is descriptive text that identifies the data in a column or row, such as Name, Score, or Date. Labels help users understand what the numbers or data in the spreadsheet represent.",
"Labels are text headings that describe what the data means. They are not part of calculations.");

q(3,"Excel","A student has sales data in column B and types =SUM(B2:B10) in cell B11. What will cell B11 display?",
["The word SUM","The number of cells in the range","The total of all values in cells B2 through B10","An error message","The average of the values"],2,
"Think about what the SUM function does to a range of values.",
"The formula =SUM(B2:B10) adds together all the numeric values in cells B2 through B10 and displays the total in cell B11. This is the core purpose of the SUM function.",
"=SUM(range) always gives the total (sum) of all values in that range.");

q(2,"Excel","What is the function icon (function button) used for in Excel?",
["To change the font of text","To connect to the internet","To open a dialog that lets you select and apply a formula to a cell","To print the spreadsheet","To change the background colour"],2,
"Think about what happens when you press the function icon next to the formula bar.",
"The function icon (often shown as fx) opens a dialog box that lets you browse and insert Excel functions like SUM, AVERAGE, or COUNT into your formula. It helps users find and use functions without memorising their exact syntax.",
"The fx button helps you find and insert functions. It opens the formula assistant dialog.");

q(3,"Excel","Why is it important to use labels in a spreadsheet?",
["Labels make the spreadsheet look more colourful","Labels slow down calculations","Labels help users understand what each row and column of data represents, making the spreadsheet easier to read and use","Labels are required for formulas to work","Labels automatically sort the data"],2,
"Think about what happens when someone else opens your spreadsheet without labels.",
"Without labels, a spreadsheet is just a grid of numbers with no context. Labels identify what each row and column represents, making it easy for any user to understand and use the data correctly. Good labels are essential for clear, professional spreadsheets.",
"Labels give meaning to data. A spreadsheet without labels is impossible for others to understand.");

// ──────────────────────────────────────────────────────────────────────────────

var QS_PER_ROUND = 20;
var deck=[], cur=0, rights=0, wrongs=0, hintCount=0, hist=[];

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function init(){
  deck=shuffle(POOL.slice()).slice(0,QS_PER_ROUND);
  cur=0;rights=0;wrongs=0;hintCount=0;hist=[];
  document.getElementById('qarea').style.display='block';
  document.getElementById('rscreen').style.display='none';
  document.getElementById('fixednext').style.display='none';
  document.body.className='';
  render();
}

function render(){
  var q=deck[cur];
  document.getElementById('qcounter').textContent='Question '+(cur+1)+' of '+deck.length;
  document.getElementById('prog').style.width=(((cur)/deck.length)*100)+'%';
  document.getElementById('scr').textContent=rights;
  document.getElementById('scw').textContent=wrongs;
  document.getElementById('qnum').textContent='Q'+(cur+1);
  var pill=document.getElementById('qpill');
  if(q.d===1){pill.textContent='Easy';pill.className='qpill easy';}
  else if(q.d===2){pill.textContent='Medium';pill.className='qpill medium';}
  else{pill.textContent='Hard';pill.className='qpill hard';}
  document.getElementById('qtopic').textContent=q.type;
  document.getElementById('qtext').textContent=q.text;
  var oc=document.getElementById('opts');
  oc.innerHTML='';
  for(var i=0;i<q.opts.length;i++){
    var btn=document.createElement('button');
    btn.className='opt';
    btn.id='opt'+i;
    btn.innerHTML='<span class="oletter">'+L[i]+'</span>'+q.opts[i];
    btn.onclick=(function(idx){return function(){answer(idx);};})(i);
    oc.appendChild(btn);
  }
  document.getElementById('ebox').style.display='none';
  document.getElementById('hbtn').style.display='block';
  document.getElementById('hbtn').textContent='Show first-step hint';
  document.getElementById('hbox').style.display='none';
  document.getElementById('hbox').textContent=q.hint;
  document.getElementById('etext').textContent=q.expl;
  document.getElementById('itext').textContent='\u2b50 Key insight: '+q.insight;
  document.getElementById('fixednext').style.display='none';
}

function answer(chosen){
  var q=deck[cur];
  var opts=document.getElementById('opts').querySelectorAll('.opt');
  for(var i=0;i<opts.length;i++) opts[i].onclick=null;
  var lbl=document.getElementById('rlabel');
  if(chosen===q.ans){
    document.getElementById('opt'+chosen).classList.add('correct');
    rights++;document.getElementById('scr').textContent=rights;
    hist.push('c');
    lbl.textContent='Correct!';
    lbl.className='rlabel ok';
  } else {
    document.getElementById('opt'+chosen).classList.add('wrong');
    document.getElementById('opt'+q.ans).classList.add('reveal');
    wrongs++;document.getElementById('scw').textContent=wrongs;
    hist.push('w');
    lbl.textContent='Wrong - the answer was ('+L[q.ans]+')';
    lbl.className='rlabel ng';
  }
  document.getElementById('ebox').style.display='block';
  document.getElementById('hbtn').style.display='none';
  document.getElementById('hbox').style.display='none';
  document.getElementById('fixednext').style.display='block';
  document.body.className='answered';
}

function toggleHint(){
  var hbox=document.getElementById('hbox');
  var hbtn=document.getElementById('hbtn');
  if(hbox.style.display==='none'){
    hbox.style.display='block';hbtn.textContent='Hide hint';hintCount++;
  } else {
    hbox.style.display='none';hbtn.textContent='Show first-step hint';
  }
}

function nextQ(){
  cur++;
  document.getElementById('fixednext').style.display='none';
  document.body.className='';
  if(cur>=deck.length){showResult();return;}
  render();
  window.scrollTo(0,0);
}

function showResult(){
  document.getElementById('qarea').style.display='none';
  document.getElementById('rscreen').style.display='block';
  var pct=Math.round(rights/deck.length*100);
  document.getElementById('rscore').textContent=rights+' / '+deck.length;
  document.getElementById('rbc').textContent=rights;
  document.getElementById('rbw').textContent=wrongs;
  document.getElementById('rbh').textContent=hintCount;
  document.getElementById('rbp').textContent=pct+'%';
  var dd=document.getElementById('dots');dd.innerHTML='';
  for(var i=0;i<hist.length;i++){
    var d=document.createElement('div');
    d.className='dot '+hist[i];dd.appendChild(d);
  }
  var msg;
  if(pct>=90) msg='Outstanding! Almost everything correct!';
  else if(pct>=75) msg='Really well done! Review the ones you missed.';
  else if(pct>=55) msg='Good effort! Read the explanations and try again!';
  else msg='Keep going! Read the insights carefully and try a new round!';
  document.getElementById('rmsg').textContent=msg;
  window.scrollTo(0,0);
}

function restart(){init();}
init();
</script>
