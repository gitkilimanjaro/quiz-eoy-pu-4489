<title>ICT Grade 7 Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;padding:20px}
.wrap{max-width:680px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px;color:#1a1a2e}
.sub{color:#666;font-size:.82rem;margin-bottom:16px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.topbar span{font-size:.8rem;color:#777}
.scores{display:flex;gap:8px}
.sc{font-size:.8rem;padding:3px 12px;border-radius:20px;border:1.5px solid}
.sc.ok{border-color:#16a34a;color:#16a34a}
.sc.ng{border-color:#dc2626;color:#dc2626}
.prog-bg{height:6px;background:#ddd;border-radius:3px;margin-bottom:16px}
.prog-fill{height:100%;background:#4f46e5;border-radius:3px;transition:width .4s}
#fixednext{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:#fff;border:none;
  padding:18px;font-size:1.1rem;font-weight:bold;font-family:'Segoe UI',Arial,sans-serif;
  cursor:pointer;display:none;z-index:999;text-align:center}
#fixednext:hover{background:#4f46e5}
body.answered{padding-bottom:70px}
.card{background:#fff;border-radius:16px;padding:22px;border:1px solid #e0e4f0;margin-bottom:12px;box-shadow:0 2px 8px rgba(79,70,229,.07)}
.qmeta{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.qnum{font-size:.72rem;color:#aaa}
.qpill{font-size:.68rem;padding:2px 10px;border-radius:10px;font-weight:bold}
.easy{background:#e6f9ee;color:#15803d;border:1px solid #bbf7d0}
.medium{background:#e8f0fe;color:#1a56db;border:1px solid #c3d7fc}
.hard{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.topic-pill{font-size:.65rem;padding:2px 8px;border-radius:10px;background:#f3f0ff;color:#5b21b6;border:1px solid #ddd6fe}
.qtext{font-size:1rem;font-weight:bold;line-height:1.65;margin-bottom:16px;color:#111}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.opt{display:flex;align-items:center;gap:10px;background:#fafbff;border:1.5px solid #e0e4f0;
  border-radius:10px;padding:12px 14px;cursor:pointer;font-size:.92rem;
  font-family:'Segoe UI',Arial,sans-serif;color:#111;text-align:left;width:100%;transition:all .15s}
.opt:hover{background:#f0f0ff;border-color:#a5b4fc}
.oletter{width:28px;height:28px;border-radius:50%;border:1.5px solid #ccc;
  display:flex;align-items:center;justify-content:center;font-size:.72rem;
  font-weight:bold;flex-shrink:0;color:#888;background:#fff}
.opt.correct{border-color:#16a34a !important;background:#f0fdf4 !important}
.opt.correct .oletter{background:#16a34a !important;color:#fff !important;border-color:#16a34a !important}
.opt.wrong{border-color:#dc2626 !important;background:#fef2f2 !important}
.opt.wrong .oletter{background:#dc2626 !important;color:#fff !important;border-color:#dc2626 !important}
.opt.reveal{border-color:#16a34a !important}
.opt.reveal .oletter{border-color:#16a34a !important;color:#16a34a !important}
.rlabel{font-size:.88rem;font-weight:bold;margin-bottom:10px;padding:8px 12px;border-radius:8px}
.rlabel.ok{color:#15803d;background:#f0fdf4;border:1px solid #bbf7d0}
.rlabel.ng{color:#dc2626;background:#fef2f2;border:1px solid #fecaca}
.hbtn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 14px;
  font-size:.78rem;color:#555;cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;margin-bottom:8px}
.hbox{font-size:.84rem;line-height:1.6;color:#1e40af;padding:10px 12px;
  border-left:3px solid #3b82f6;background:#eff6ff;border-radius:0 8px 8px 0;margin-bottom:8px}
.ebox{padding:12px;background:#f9f9f9;border-radius:10px;border:1px solid #e5e5e5}
.elabel{font-size:.68rem;font-weight:bold;color:#aaa;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:5px}
.etext{font-size:.84rem;line-height:1.7;color:#444;margin-bottom:8px}
.insight{font-size:.84rem;line-height:1.6;padding:8px 10px;
  border-left:3px solid #f59e0b;background:#fffbeb;border-radius:0 8px 8px 0;color:#78350f}
#rscreen{display:none}
.rscore{font-size:3rem;font-weight:bold;margin:8px 0;color:#1a1a2e}
.rmsg{color:#555;font-size:.9rem;line-height:1.6;margin-bottom:14px}
.dots{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd}
.dot.c{background:#16a34a} .dot.w{background:#dc2626}
.rgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.rcard{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:10px;padding:12px 6px;text-align:center}
.rnum{font-size:1.5rem;font-weight:bold;display:block;margin-bottom:2px}
.rnum.ok{color:#16a34a} .rnum.ng{color:#dc2626} .rnum.bl{color:#4f46e5}
.rlbl2{font-size:.68rem;color:#aaa}
.brestart{display:block;width:100%;background:#1a1a2e;color:#fff;border:none;border-radius:10px;
  padding:14px;font-size:1rem;font-weight:bold;cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;margin-bottom:6px}
.brestart:hover{background:#4f46e5}
.pool-info{font-size:.72rem;color:#999;text-align:center}
@media(max-width:420px){.rgrid{grid-template-columns:repeat(2,1fr)}}
</style>

<body>
<div class="wrap">
  <h1>&#128187; ICT Grade 7 Quiz</h1>
  <p class="sub">Computers &middot; Binary &middot; e-Safety &middot; Ethics &middot; Excel &middot; HTML &nbsp;&middot;&nbsp; 20 questions per round</p>

  <div id="qarea">
    <div class="topbar">
      <span id="qcounter">Question 1 of 20</span>
      <div class="scores">
        <div class="sc ok">&#10003; <span id="scr">0</span></div>
        <div class="sc ng">&#10007; <span id="scw">0</span></div>
      </div>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div class="card">
      <div class="qmeta">
        <span class="qnum" id="qnum"></span>
        <span class="qpill" id="qpill"></span>
        <span class="topic-pill" id="qtopic"></span>
      </div>
      <div class="qtext" id="qtext"></div>
      <div class="opts" id="opts"></div>
      <div id="ebox" style="display:none">
        <div id="rlabel" class="rlabel"></div>
        <button class="hbtn" id="hbtn" onclick="toggleHint()" style="display:none">Show first-step hint</button>
        <div class="hbox" id="hbox" style="display:none"></div>
        <div class="ebox">
          <div class="elabel">Explanation</div>
          <div class="etext" id="etext"></div>
          <div class="insight" id="itext"></div>
        </div>
      </div>
    </div>
  </div>
  <button id="fixednext" onclick="nextQ()">Next Question &#8594;</button>

  <div id="rscreen">
    <div class="card">
      <h2 style="margin-bottom:6px;color:#1a1a2e">Round Complete!</h2>
      <div class="rscore" id="rscore"></div>
      <div class="rmsg" id="rmsg"></div>
      <div class="dots" id="dots"></div>
      <div class="rgrid">
        <div class="rcard"><span class="rnum ok" id="rbc"></span><span class="rlbl2">Correct</span></div>
        <div class="rcard"><span class="rnum ng" id="rbw"></span><span class="rlbl2">Wrong</span></div>
        <div class="rcard"><span class="rnum bl" id="rbh"></span><span class="rlbl2">Hints used</span></div>
        <div class="rcard"><span class="rnum bl" id="rbp"></span><span class="rlbl2">Score</span></div>
      </div>
      <button class="brestart" onclick="restart()">&#8635; New Round (20 new questions)</button>
      <div class="pool-info">118 questions in pool &mdash; 20 per round &mdash; answers vary each round</div>
    </div>
  </div>
</div>

<script>
var POOL = [];
var L = ['A','B','C','D','E'];
function q(d,tp,text,opts,ans,hint,expl,insight){
  POOL.push({d:d,type:tp,text:text,opts:opts,ans:ans,hint:hint,expl:expl,insight:insight});
}

// ── HARDWARE & SOFTWARE (20 questions) ──────────────────────────────────────
q(1,"Hardware/Software","Which of the following is the best definition of hardware?",
["Programs that run on a computer","Physical components of a computer that you can touch","Instructions stored on a disk","The operating system of a computer","Data saved in memory"],1,
"Think about whether you can physically pick it up or touch it.",
"Hardware refers to all the physical parts of a computer you can see and touch, such as the keyboard, screen, and hard drive. Software, on the other hand, is the set of instructions or programs that run on the hardware.",
"If you can hold it in your hand, it is hardware. If it only exists as code or instructions, it is software.");

q(1,"Hardware/Software","Which of the following is an example of software?",
["Keyboard","Hard drive","Microsoft Word","Monitor","USB cable"],2,
"Software is something you cannot physically touch.",
"Microsoft Word is a software application, meaning it is a program that runs on the computer. The keyboard, hard drive, monitor, and USB cable are all physical items, making them hardware.",
"Software lives on the computer as instructions or programs. You cannot touch software.");

q(1,"Hardware/Software","A student wants to type a document. Which input device would they use?",
["Monitor","Printer","Keyboard","Speaker","Hard drive"],2,
"An input device sends information into the computer.",
"A keyboard is an input device because it allows the user to send data (text) into the computer. The monitor and speaker are output devices. The printer is also an output device. The hard drive is a storage device.",
"Input devices send data IN. Output devices send information OUT.");

q(1,"Hardware/Software","Which of the following is an output device?",
["Scanner","Keyboard","Webcam","Printer","USB flash drive"],3,
"An output device takes information from the computer and presents it to the user.",
"A printer is an output device because it takes data from the computer and produces a physical printed page for the user. Scanners, keyboards, and webcams are input devices. A USB flash drive is a storage device.",
"Output = the computer giving something OUT to the user.");

q(1,"Hardware/Software","What type of device is a hard disk drive?",
["Input device","Output device","Processing device","Storage device","Communication device"],3,
"Think about what a hard disk drive does with data.",
"A hard disk drive stores data permanently so it can be retrieved later. It does not send data in or out to the user directly, and it does not process data. Therefore it is a storage device.",
"Storage devices keep data for later use, even when the computer is turned off.");

q(2,"Hardware/Software","A teacher wants to project her screen onto a classroom wall. Which output device does she need?",
["Scanner","Projector","Webcam","Microphone","Joystick"],1,
"What device can display an image on a large surface like a wall?",
"A projector is an output device that takes the display signal from the computer and shows it enlarged on a wall or screen. This is ideal for classroom presentations. The other options are input devices.",
"Projectors are output devices. They show the computer screen to a large audience.");

q(2,"Hardware/Software","Which of the following is the best example of an input device used for drawing or design?",
["Printer","Monitor","Graphics tablet","Speaker","Projector"],2,
"Think about which device lets an artist draw directly into the computer.",
"A graphics tablet (also called a drawing tablet) is an input device that lets users draw with a stylus, sending that movement as data into the computer. It is commonly used by designers and artists.",
"A graphics tablet is an input device, not an output device, even though it looks like a drawing surface.");

q(1,"Hardware/Software","Which of the following is an example of system software?",
["Microsoft Excel","Windows operating system","Google Chrome","Adobe Photoshop","A game app"],1,
"System software manages the computer hardware and provides a platform for other programs.",
"The Windows operating system is system software. It manages all the hardware resources and provides a platform for application software like Excel or Chrome to run on. Application software is designed for the end user to complete specific tasks.",
"The operating system is always system software. Apps like Excel or games are application software.");

q(2,"Hardware/Software","A photographer wants to store 10,000 high-resolution photos. Which storage device is most suitable?",
["USB flash drive with 2GB","Floppy disk","External hard drive with 2TB","CD-ROM","RAM chip"],2,
"Consider which device has the largest storage capacity.",
"An external hard drive with 2TB has enormous capacity, easily holding thousands of high-resolution photos. USB flash drives with only 2GB would be too small. Floppy disks and CD-ROMs have very limited capacity. RAM is temporary memory, not permanent storage.",
"For large amounts of data, hard drives offer the most storage capacity.");

q(2,"Hardware/Software","Which of the following describes the difference between RAM and a hard drive?",
["RAM is permanent storage; hard drive is temporary","RAM is temporary and loses data when power is off; hard drive stores data permanently","RAM is an output device; hard drive is an input device","RAM is slower than a hard drive","They are exactly the same thing"],1,
"Think about what happens to each type of memory when you switch off the computer.",
"RAM (Random Access Memory) is temporary or volatile memory. When the computer is switched off, all data in RAM is lost. A hard drive stores data permanently, so files are still there after the computer is turned off.",
"RAM = temporary (volatile). Hard drive = permanent (non-volatile). This is a classic exam distinction.");

q(1,"Hardware/Software","Which of the following is NOT a storage device?",
["USB flash drive","Hard disk drive","CD-ROM","Monitor","SD card"],3,
"A storage device holds data. Which item in the list is used for a different purpose?",
"A monitor is an output device, not a storage device. It displays information for the user to see. The USB flash drive, hard disk drive, CD-ROM, and SD card are all storage devices used to save data.",
"Monitors display information, they do not store it.");

q(1,"Hardware/Software","What does the abbreviation CPU stand for?",
["Computer Processing Utility","Central Processing Unit","Core Program Uploader","Calculating Power Unit","Central Program Utility"],1,
"It is the brain of the computer. Think about what the letters stand for.",
"CPU stands for Central Processing Unit. It is the main chip inside the computer that carries out instructions from programs and processes all data.",
"The CPU is the brain of the computer. Always remember: Central Processing Unit.");

q(2,"Hardware/Software","A microphone connected to a computer is best described as which type of device?",
["Output device","Storage device","Input device","Processing device","Printing device"],2,
"Does the microphone send sound INTO the computer, or does it receive sound FROM the computer?",
"A microphone is an input device. It captures sound from the environment and converts it into digital data that is sent into the computer. Speakers are the output equivalent, sending sound OUT from the computer.",
"Microphone = input (sound goes IN). Speaker = output (sound comes OUT).");

q(2,"Hardware/Software","Which pair correctly matches each item to its category?",
["Keyboard = output, Printer = input","Keyboard = input, Printer = output","Keyboard = storage, Printer = output","Keyboard = input, Printer = storage","Keyboard = output, Printer = storage"],1,
"Think: does a keyboard send data in, and does a printer send information out?",
"A keyboard is an input device because it sends keystrokes into the computer. A printer is an output device because it takes data from the computer and produces a printed page for the user.",
"Keyboard goes IN, Printer comes OUT. This is a common paired question in exams.");

q(3,"Hardware/Software","A school library wants to convert physical books into digital files. Which input device is most appropriate?",
["Printer","Projector","Speaker","Scanner","Monitor"],3,
"Which device can read a physical document and send the image into the computer?",
"A scanner is the correct input device for this task. It reads the physical page and converts it to a digital image that the computer can store. A printer goes the other direction (computer to paper). Projectors and speakers are output devices.",
"Scanners convert physical documents into digital data. They are input devices.");

q(1,"Hardware/Software","Which of the following is application software?",
["Windows 11","Linux","macOS","Google Chrome","Android system kernel"],3,
"Application software is designed for the end user to complete a specific task.",
"Google Chrome is application software because it is a program that the user directly interacts with to browse the web. Windows 11, Linux, macOS, and the Android kernel are all operating systems, which are system software.",
"Web browsers, games, and office apps are application software. Operating systems are system software.");

q(2,"Hardware/Software","Which component of the CPU performs mathematical calculations and logical comparisons?",
["Control Unit","RAM","Hard Drive","ALU (Arithmetic Logic Unit)","Cache"],3,
"The CPU has two main parts. One controls, one calculates.",
"The Arithmetic Logic Unit (ALU) is the part of the CPU that performs all mathematical calculations (such as addition) and logical comparisons (such as deciding if one number is greater than another). The Control Unit manages the flow of instructions.",
"ALU = the calculator inside the CPU. Control Unit = the manager inside the CPU.");

q(2,"Hardware/Software","What is the role of the Control Unit inside the CPU?",
["To store data permanently","To display images on screen","To manage and coordinate the execution of instructions","To connect the computer to the internet","To perform arithmetic calculations"],2,
"The Control Unit does not calculate, it directs.",
"The Control Unit manages the flow of instructions inside the CPU. It fetches instructions from memory, decodes them, and directs other parts of the computer to carry them out. The ALU does the actual calculations.",
"Think of the Control Unit as the manager and the ALU as the worker.");

q(3,"Hardware/Software","A school buys new computers with faster CPUs. What is the most likely benefit?",
["The screen will be larger","Programs will run more quickly","The keyboard will respond louder","Files will be stored longer","The internet connection will be faster"],1,
"The CPU processes instructions. What happens when it processes them faster?",
"A faster CPU means the computer can execute more instructions per second, so programs open faster and run more smoothly. Screen size, keyboard, file storage duration, and internet speed are not directly determined by CPU speed.",
"CPU speed affects how fast programs run. It does not affect screen size or internet speed.");

q(1,"Hardware/Software","Which of the following is a suitable input device for a gaming console?",
["Printer","Monitor","Joystick or gamepad","Speaker","Projector"],2,
"Think about how a player controls a game.",
"A joystick or gamepad is an input device that lets players control games by sending button presses and directional movements into the console. Monitors and speakers are output devices. A printer is also an output device.",
"Gamepads and joysticks are input devices because they send control data into the system.");

// ── BINARY NUMBERS (25 questions) ───────────────────────────────────────────
q(1,"Binary","In the binary number system, how many different digits are used?",
["10","8","3","2","16"],3,
"The word binary comes from Latin meaning two.",
"Binary uses only two digits: 0 and 1. This is because computers use electronic switches that are either off (0) or on (1). The decimal system we use daily has 10 digits (0-9).",
"Binary = Base 2 = only 0 and 1. Everything a computer does is built from these two digits.");

q(1,"Binary","What does the digit 1 represent in binary when thinking about a computer switch?",
["The switch is broken","The switch is off","The switch is on","The switch is neutral","The switch is blocked"],2,
"Binary digits map directly to the state of an electronic switch.",
"In a computer, binary 1 means the switch (electronic circuit) is ON, and binary 0 means the switch is OFF. Computers use millions of these tiny switches to represent and process all data.",
"1 = ON, 0 = OFF. This is the physical foundation of all computing.");

q(1,"Binary","How many bits are in one byte?",
["2","4","16","8","1024"],3,
"This is a key unit that must be memorized.",
"One byte consists of 8 bits. A bit is a single binary digit (0 or 1). Grouping 8 bits together makes one byte, which is enough to represent one character of text.",
"8 bits = 1 byte. Always. This is one of the most important facts in computing.");

q(1,"Binary","How many bytes are in one kilobyte?",
["100","512","1024","2048","8"],2,
"Computing uses powers of 2, not powers of 10.",
"One kilobyte (KB) equals 1024 bytes. This is because computers work in binary (powers of 2), so 2 to the power of 10 = 1024 is used as the basis for kilobytes.",
"1 KB = 1024 bytes. Not 1000 bytes. The 1024 comes from 2 to the power of 10.");

q(1,"Binary","What is the decimal value of the binary number 0001?",
["0","2","4","8","1"],4,
"The rightmost position in binary has a place value of 1.",
"In binary, the rightmost digit has a place value of 1. The binary number 0001 has a 1 only in the ones place, so its decimal value is 1.",
"Start from the right: place values are 1, 2, 4, 8, 16... going left.");

q(1,"Binary","What is the decimal value of the binary number 0010?",
["1","2","4","8","3"],1,
"The second position from the right has a place value of 2.",
"In binary, from right to left the place values are 1, 2, 4, 8. The number 0010 has a 1 in the second position (value 2) and zeros everywhere else, so it equals 2 in decimal.",
"Binary place values double each time you move left: 1, 2, 4, 8, 16...");

q(1,"Binary","What is the decimal value of the binary number 0100?",
["2","1","4","8","16"],2,
"Count the position from the right. The third position has value 4.",
"The binary number 0100 has a 1 in the third position from the right (place value = 4) and zeros elsewhere. So 0100 in binary equals 4 in decimal.",
"Third position from right = place value of 4 (which is 2 squared).");

q(2,"Binary","What is the decimal value of the binary number 1010?",
["3","5","10","12","8"],2,
"Add up the place values where a 1 appears.",
"The binary number 1010 has 1s in the 8s position and the 2s position. Adding those: 8 + 2 = 10. The zeros in the 4s and 1s positions contribute nothing.",
"Always add only the place values that have a 1. Zeros contribute nothing.");

q(2,"Binary","What is the decimal value of the binary number 1111?",
["12","14","15","16","8"],2,
"Add all four place values together since all digits are 1.",
"The binary number 1111 has 1s in positions 8, 4, 2, and 1. Adding them: 8 + 4 + 2 + 1 = 15. This is the largest value a 4-bit number can hold.",
"1111 in binary = 15 in decimal. Four 1s always gives you 2 to the power of 4 minus 1 = 15.");

q(2,"Binary","What is the decimal value of the binary number 1001?",
["3","9","5","6","10"],1,
"Only the 8s and 1s positions have a 1.",
"The binary number 1001 has 1s in the 8s position and the 1s position. 8 + 1 = 9. The 4s and 2s positions are zero.",
"1001 = 8 + 1 = 9. Watch out for the zeros in the middle!");

q(2,"Binary","Which binary number represents the decimal value 5?",
["0101","1010","0110","1100","0011"],0,
"Find which combination of 4 and 1 adds to 5.",
"5 = 4 + 1. In binary, the 4s position is the third from the right, and the 1s position is the rightmost. So 0101 represents 5. Checking: 0+4+0+1 = 5.",
"To convert decimal to binary, find which powers of 2 add up to your number.");

q(2,"Binary","Which binary number represents the decimal value 12?",
["1010","1100","0111","1111","1001"],1,
"12 = 8 + 4. Which positions does that activate?",
"12 = 8 + 4. The 8s position (4th from right) and 4s position (3rd from right) both have 1s, giving 1100. Checking: 8+4+0+0 = 12.",
"1100 in binary = 12 in decimal. The two leftmost bits of a 4-bit number.");

q(2,"Binary","Which binary number represents the decimal value 7?",
["1110","0111","1010","1001","1111"],1,
"7 = 4 + 2 + 1. Which positions does that use?",
"7 = 4 + 2 + 1. That activates the 4s, 2s, and 1s positions: 0111. Checking: 0+4+2+1 = 7.",
"0111 = 7. Three consecutive 1s in the lowest positions.");

q(3,"Binary","What is the result of the binary addition 0011 + 0001?",
["0101","0100","0010","0110","1000"],1,
"Add column by column from right to left, just like decimal addition but in binary.",
"Starting from the right: 1+1=10 in binary (write 0, carry 1). Next: 1+0+carry 1 = 10 (write 0, carry 1). Next: 0+0+carry 1 = 1 (write 1, no carry). Leftmost: 0+0 = 0. Result: 0100.",
"Binary addition rule: 0+0=0, 0+1=1, 1+1=10 (write 0 carry 1), 1+1+1=11 (write 1 carry 1).");

q(3,"Binary","What is the result of the binary addition 0101 + 0011?",
["1001","1010","0110","1000","0111"],3,
"Add column by column from right. Remember the carry rules.",
"Right column: 1+1=10, write 0 carry 1. Second column: 0+1+carry 1=10, write 0 carry 1. Third column: 1+0+carry 1=10, write 0 carry 1. Fourth column: 0+0+carry 1=1. Result: 1000.",
"0101 + 0011 = 1000 in binary, which equals 5+3=8 in decimal. Always verify by checking the decimal values.");

q(3,"Binary","What is the result of the binary addition 0110 + 0010?",
["1010","0100","1000","1100","0111"],2,
"Add column by column from the right.",
"Right column: 0+0=0. Second column: 1+1=10, write 0 carry 1. Third column: 1+0+carry 1=10, write 0 carry 1. Fourth column: 0+0+carry 1=1. Result: 1000. This is 6+2=8 in decimal.",
"Verify binary addition by converting back to decimal: 6+2=8 and 1000 in binary = 8. Correct!");

q(1,"Binary","How many kilobytes are in one megabyte?",
["100","512","1000","1024","2048"],3,
"Each step in the storage hierarchy multiplies by 1024.",
"One megabyte equals 1024 kilobytes. Just as 1 KB = 1024 bytes, each step up in the hierarchy multiplies by 1024 (which is 2 to the power of 10).",
"The pattern is: 1024 bytes = 1 KB, 1024 KB = 1 MB, 1024 MB = 1 GB, 1024 GB = 1 TB.");

q(1,"Binary","Which unit of storage is the largest?",
["Kilobyte","Megabyte","Gigabyte","Byte","Terabyte"],4,
"Put the units in order from smallest to largest.",
"From smallest to largest: Bit, Byte, Kilobyte, Megabyte, Gigabyte, Terabyte. A Terabyte is the largest in this list, equal to 1024 Gigabytes.",
"Storage order (small to large): Bit, Byte, KB, MB, GB, TB.");

q(2,"Binary","A music file is 4 megabytes. How many kilobytes is that?",
["400 KB","4000 KB","4096 KB","40 KB","40960 KB"],2,
"Multiply by 1024 to convert from MB to KB.",
"1 MB = 1024 KB. So 4 MB = 4 x 1024 = 4096 KB. Many students make the mistake of multiplying by 1000, but in computing it is always 1024.",
"MB to KB: multiply by 1024. KB to MB: divide by 1024.");

q(2,"Binary","What is the decimal value of the binary number 1101?",
["11","12","13","14","15"],2,
"Add the place values where a 1 appears: check positions 8, 4, 2, 1.",
"1101 has 1s in the 8s, 4s, and 1s positions: 8+4+0+1 = 13. The 2s position is 0 and contributes nothing.",
"1101 = 8+4+1 = 13. The missing 2 in the middle is a common mistake spot.");

q(2,"Binary","Which binary number represents the decimal value 9?",
["1001","1010","0110","1100","1011"],0,
"9 = 8 + 1. Which binary positions activate?",
"9 = 8 + 1. The 8s position (leftmost in a 4-bit number) and the 1s position (rightmost) are both 1. So the binary is 1001.",
"9 = 1001 in binary. Notice the pattern: 8 and 1 with zeros in between.");

q(1,"Binary","What does the term bit stand for?",
["Binary integer","Basic information term","Binary digit","Byte in total","Big integer type"],2,
"The word bit is a contraction of two words.",
"Bit stands for Binary Digit. A bit is the smallest unit of data in computing, and it can only be a 0 or a 1. Eight bits make one byte.",
"Bit = Binary Digit. It is the smallest possible unit of data.");

q(3,"Binary","A computer stores one letter using 1 byte. How many letters can be stored in 1 kilobyte?",
["8","100","256","1024","512"],3,
"1 byte stores 1 character. How many bytes are in 1 KB?",
"1 KB = 1024 bytes, and each byte stores 1 character of text. Therefore 1 KB can store 1024 characters (letters or symbols).",
"1 byte = 1 character. 1 KB = 1024 bytes = 1024 characters. Simple but easy to forget.");

q(2,"Binary","What is the largest decimal number that can be represented using exactly 4 bits?",
["8","16","14","15","12"],3,
"What happens when all 4 bits are set to 1?",
"With 4 bits all set to 1 (1111), the value is 8+4+2+1 = 15. The number 16 would require 5 bits (10000). So 15 is the maximum for a 4-bit number.",
"4 bits: maximum = 1111 = 15. In general, n bits can represent values from 0 to (2 to the power of n) minus 1.");

// ── E-SAFETY (30 questions) ──────────────────────────────────────────────────
q(1,"e-Safety","What is the main purpose of e-Safety rules?",
["To stop students from using the internet","To help people stay safe when using digital technology","To make websites load faster","To improve computer speed","To prevent sharing any information online"],1,
"Think about what the word safety implies in a digital context.",
"e-Safety refers to practices and rules that help people use digital technology safely and responsibly. The goal is not to prevent internet use, but to ensure people know how to protect themselves from dangers such as cyberbullying, fraud, and inappropriate content.",
"e-Safety is about using technology safely, not avoiding it.");

q(1,"e-Safety","What is a digital footprint?",
["A physical stamp left on a keyboard","All the information about you that exists online","The speed of your internet connection","The size of files downloaded","The number of websites you have created"],1,
"Think about the traces you leave behind every time you go online.",
"A digital footprint is all the information about you that can be found online. This includes photos you post, comments you make, social media profiles, and data collected by websites you visit. It can affect your future reputation.",
"Everything you do online leaves a trace. Your digital footprint can last forever.");

q(1,"e-Safety","Why is it important to protect your personal information online?",
["Because websites need it to work","So that strangers cannot misuse it to harm or deceive you","Because it makes pages load faster","So your photos look better","It is not important to protect it"],1,
"Think about what a stranger could do with your name, address, and phone number.",
"Personal information like your full name, address, phone number, school name, and photos can be used by strangers to locate, deceive, or harm you. Protecting this information reduces risks such as identity theft and grooming.",
"Never share personal details with strangers online. Personal info in wrong hands can cause real harm.");

q(1,"e-Safety","Which of the following is an example of personal information that should NOT be shared with strangers online?",
["Your favourite colour","Your home address","Your favourite movie","Your school subject preference","Your favourite food"],1,
"Think about which piece of information could help a stranger find you in real life.",
"Your home address is personal information that could allow a stranger to physically locate you. Favourite colours, movies, subjects, and foods are harmless preferences that do not reveal your identity or location.",
"Personal info that reveals your identity or location must be kept private online.");

q(2,"e-Safety","A student receives an email from an unknown person with an attachment. What should they do?",
["Open the attachment to see what it is","Forward it to all friends","Delete it without opening and tell a trusted adult","Reply asking who sent it","Download and open the attachment if it looks interesting"],2,
"Think about the risks of opening unknown attachments.",
"Opening attachments from unknown senders is dangerous. They may contain malware (harmful software) that can damage your computer or steal your data. The safest action is to delete the email without opening it and inform a trusted adult.",
"Never open attachments from unknown senders. This is one of the most common ways malware spreads.");

q(2,"e-Safety","Someone online claims to be a 12-year-old student from your school, but you do not recognize them. What is the safest response?",
["Immediately share your phone number so you can meet","Tell them your home address so they can visit","Be cautious, do not share personal details, and tell a trusted adult","Accept them as a friend on all platforms","Arrange to meet them alone at a quiet location"],2,
"People online are not always who they claim to be.",
"Online, people can pretend to be anyone. A person claiming to be a student your age could actually be an adult with harmful intentions. The safe approach is to be cautious, not share personal information, and inform a trusted adult.",
"You cannot verify who someone truly is online. Always involve a trusted adult if unsure.");

q(1,"e-Safety","What is cyberbullying?",
["Using a computer to study","Bullying that happens through digital devices and online platforms","Playing competitive games online","Learning to code on the internet","Building websites for fun"],1,
"The prefix cyber means digital or relating to the internet.",
"Cyberbullying is when someone uses digital technology such as social media, messaging apps, or online games to bully, harass, threaten, or embarrass another person. It can be just as harmful as physical bullying.",
"Cyberbullying is real bullying. The fact that it happens online does not make it less serious.");

q(2,"e-Safety","A student is being bullied online. What is the best first step?",
["Bully the person back","Keep it secret and do nothing","Block the person, save evidence, and tell a trusted adult","Leave all social media forever","Share the messages publicly"],2,
"Think about what actions will actually help stop the situation.",
"The best response to cyberbullying is to block the bully to stop further contact, save evidence (screenshots) in case it is needed for reporting, and tell a trusted adult such as a parent or teacher who can help resolve it.",
"Block, save evidence, and report to a trusted adult. Do not respond or retaliate.");

q(1,"e-Safety","Which of the following is the safest approach when using social media?",
["Post your phone number so friends can contact you","Keep your profile private and only accept friends you know in real life","Share your location so friends know where you are","Accept all friend requests to be popular","Post your daily schedule publicly"],1,
"Think about who can see your information on social media.",
"Setting your profile to private and only connecting with people you know in real life limits who can see your information. Public profiles expose your data to anyone, including strangers with harmful intentions.",
"Private profile + real-life friends only = much safer social media experience.");

q(2,"e-Safety","Why should you never arrange to meet someone in person that you have only met online?",
["Meeting new friends is always safe","They could be dangerous and not who they claimed to be","It is fine if you bring your phone","Online friends are always trustworthy","You should always meet alone first"],1,
"Remember that people can lie about who they are online.",
"A person you have only met online may have lied about their identity, age, and intentions. Meeting such a person, especially alone, could put you in a dangerous situation. Always involve trusted adults and never go alone.",
"Never meet an online stranger alone. The risk is too high because online identities can be completely fabricated.");

q(1,"e-Safety","What should you do if you see inappropriate content online?",
["Share it with your friends","Download it for later","Close it and report it to a trusted adult","React to it with a like","Ignore it and keep browsing normally"],2,
"Inappropriate content should be reported, not shared or ignored.",
"When you encounter inappropriate content online (such as violent, harmful, or illegal material), you should close it immediately and report it to a trusted adult. This helps protect you and others.",
"Close, then report. Never share or engage with inappropriate content.");

q(2,"e-Safety","A website asks you to enter your full name, address, and credit card details to receive a free prize. What is this most likely to be?",
["A legitimate prize offer","A phishing scam trying to steal your information","A school competition","A government survey","A safe online shopping site"],1,
"If something sounds too good to be true, it usually is.",
"This is a classic phishing scam. Fraudsters create fake prize offers to trick people into sharing personal and financial information. Legitimate competitions do not usually ask for credit card details.",
"Free prize + personal info request = almost always a scam. Never enter financial details on unknown sites.");

q(1,"e-Safety","What is a strong password?",
["Your first name","123456","A mix of letters, numbers, and symbols that is hard to guess","Your birthday","Your pet name"],2,
"A strong password is one that is difficult for others to guess or for a computer to crack.",
"A strong password uses a combination of uppercase and lowercase letters, numbers, and symbols. It should not include obvious personal information like your name or birthday. Long passwords with random characters are the hardest to crack.",
"Strong password = long, random, mix of characters. Never use personal info or simple sequences.");

q(2,"e-Safety","Why is it a bad idea to use the same password for all your online accounts?",
["Passwords are unlimited so it does not matter","If one account is hacked, all your accounts become vulnerable","It makes logging in too easy","Website rules do not allow it","Password managers prefer it"],1,
"Think about what happens if just one site gets hacked.",
"If you use the same password everywhere and one account is compromised, hackers can use that password to access all your other accounts. This is called credential stuffing. Using unique passwords for each account limits the damage.",
"One password for everything = one breach exposes everything. Use different passwords for important accounts.");

q(1,"e-Safety","What does the padlock icon in a web browser address bar indicate?",
["The website is blocked","The connection to the website is secure and encrypted","The website contains games","The website is a government site","The website is offline"],1,
"The padlock relates to security and encryption.",
"A padlock icon in the browser address bar means the website uses HTTPS, which means the connection is encrypted. This makes it safer to send personal information. Always look for the padlock before entering passwords or payment details.",
"Padlock = encrypted = safer. No padlock = unsecured = be careful with what you share.");

q(2,"e-Safety","Which of the following online behaviours is responsible and safe?",
["Sharing your school uniform photo with a new online contact","Posting your home address in a public forum","Using a nickname online and keeping personal details private","Accepting friend requests from everyone","Sending your phone number to someone you just met online"],2,
"Think about which option reveals the least personal information to strangers.",
"Using a nickname and keeping personal details private protects your identity online. All other options either reveal personal information or expose you to unknown people, which creates serious safety risks.",
"Nicknames protect your identity. Share as little personal info as possible online.");

q(2,"e-Safety","A friend sends you a link to a free game download from an unofficial website. What should you do?",
["Download it immediately","Share the link with other classmates","Be cautious, as unofficial downloads may contain malware","Always trust links from friends","Download it only if the file is small"],2,
"Think about what unofficial downloads might contain.",
"Downloads from unofficial or unknown websites can contain malware, viruses, or spyware that can harm your device or steal your information. Even links from friends should be treated carefully if the source is unknown.",
"Unofficial downloads are risky. Only download software from official, trusted sources.");

q(1,"e-Safety","What is the purpose of a safe search filter on a web browser?",
["To make searches faster","To block inappropriate or adult content from search results","To save your search history","To translate pages","To download search results"],1,
"Think about what type of content a filter would block.",
"A safe search filter blocks inappropriate, violent, or adult content from appearing in search results. Schools often enable these on student computers to ensure pupils only see age-appropriate material.",
"Safe search filters protect users from seeing harmful or inappropriate search results.");

q(3,"e-Safety","A student notices that a classmate is sharing another person private messages publicly online without permission. What should the student do?",
["Join in and share more of the messages","Ignore it completely","Report it to a teacher or adult as it is a form of cyberbullying and breach of privacy","Like the posts to get more information","Screenshot and forward to other friends"],2,
"Think about whether this behaviour respects the other person and is legal.",
"Sharing someone private messages without permission is a breach of privacy and a form of cyberbullying. Witnessing such behaviour and reporting it to a trusted adult or teacher is the responsible action.",
"Bystanders have responsibility too. Reporting cyberbullying helps stop it.");

q(2,"e-Safety","Which of the following is a sign that an email might be a phishing attempt?",
["It comes from a known friend","It uses your correct full name","It asks you to urgently click a link to verify your account or lose access","It has no attachments","It was sent from a school email address"],2,
"Phishing emails often create urgency to pressure you into acting without thinking.",
"Phishing emails often include urgent language like your account will be closed or verify now to trick you into clicking a harmful link. Legitimate organizations rarely demand urgent action via email without warning.",
"Urgency + suspicious link = phishing. Slow down and verify before clicking anything.");

q(1,"e-Safety","What does the term online grooming mean?",
["Learning programming skills online","When someone builds trust with a young person online in order to exploit or harm them","Tidying up your social media profile","Learning about personal hygiene from websites","Teaching younger students to use the internet"],1,
"Think about the word groom and what it means to be manipulated.",
"Online grooming is when an adult deliberately builds a relationship of trust with a young person online, often pretending to be a friend, with the intention of exploiting or harming them. It can lead to very dangerous real-world situations.",
"Grooming is manipulation designed to harm. Tell a trusted adult if any adult online makes you feel uncomfortable or asks to keep secrets.");

q(2,"e-Safety","Why should you log out of your accounts when using a shared or public computer?",
["To make the computer faster","So the next user cannot access your personal accounts","To save battery power","Because the computer requires it","To delete your browsing data permanently"],1,
"Think about what happens to your account if you stay logged in.",
"If you leave an account open on a shared computer, the next person who uses that computer can access your account, read your messages, and use your personal information. Always log out when finished.",
"Shared computer + not logged out = anyone can access your account. Always log out.");

q(3,"e-Safety","A student receives a message online saying: I know where you live and I will hurt you if you tell anyone we talked. What should they do?",
["Reply to the message","Keep it secret as the person asked","Tell a trusted adult immediately and show them the message","Block the person and forget about it","Share it on social media"],2,
"A threat is serious. Keeping it secret is exactly what a bully wants.",
"This message is a direct threat and possibly illegal. The student must tell a trusted adult immediately, such as a parent or teacher, and show the message as evidence. Threats should never be kept secret, even if the sender demands it.",
"Online threats are serious. Tell a trusted adult immediately. Never keep threats secret.");

q(1,"e-Safety","Which of the following details is safe to share in an online public profile?",
["Your home address","Your phone number","Your date of birth and full name together","Your favourite sports team","Your school name and class"],3,
"Think about which piece of information cannot be used to identify or locate you.",
"Your favourite sports team is a preference that tells strangers nothing about your identity or location. In contrast, your address, phone number, full name with birthday, and school name together can all be used to identify or locate you.",
"Preferences and general interests are safe. Location and identity information are not.");

q(2,"e-Safety","What is the best description of a copyright violation?",
["Buying a book from a shop","Using someone else work without permission or giving proper credit","Writing your own story","Reading content on a free website","Watching a licensed movie on a streaming service"],1,
"Copyright protects creators. Using their work without permission breaks that protection.",
"A copyright violation occurs when someone uses, copies, or distributes another person creative work (such as images, music, or writing) without getting permission from the owner. Always credit sources and obtain permission.",
"Copyright = the creator owns their work. Using it without permission is illegal.");

q(2,"e-Safety","Your classmate pressures you to share your password so they can help you with a school assignment. What should you do?",
["Share it only if they are your best friend","Share it since it is just for school","Refuse, as passwords should never be shared with anyone","Share it and change it afterwards","Give them a different password instead"],2,
"A password is private. Nobody should ever know it except you.",
"Passwords should never be shared with anyone, not even friends or classmates. Sharing a password means losing control of your account. If someone needs to help with an assignment, they can do so without needing your login credentials.",
"Your password is yours alone. Never share it, no matter the reason.");

q(1,"e-Safety","How does social media affect your digital footprint?",
["It has no effect on your digital footprint","Every post, comment, and photo you share adds to your digital footprint","Only deleted posts affect your digital footprint","Only photos affect your digital footprint","Your footprint only grows when you use private accounts"],1,
"Think about everything that gets saved online.",
"Every time you post, comment, react, or upload something on social media, that information is added to your digital footprint. Even deleted posts may be archived or seen by others first. Your digital footprint can affect your future reputation.",
"Everything you post online adds to your digital footprint. Think before you post.");

q(2,"e-Safety","A student is playing an online game and another player is sending offensive and hurtful messages. What is the best action?",
["Send offensive messages back","Leave the game and ignore it forever","Use the block and report features within the game, and tell a trusted adult","Just ignore the messages and keep playing","Share the messages with other players to embarrass the bully"],2,
"Online games have built-in safety tools for exactly this situation.",
"Online games include block and report features for a reason. Using them stops the bully from contacting you and alerts the platform. Telling a trusted adult provides additional support. Retaliating makes the situation worse.",
"Block and report in-game, then tell an adult. Built-in tools exist to protect you.");

q(3,"e-Safety","Why is it important to think carefully before posting a photo of yourself in school uniform online?",
["School uniforms look unprofessional","It reveals which school you attend, which could help strangers locate you","Other students will copy your style","Uniforms look boring in photos","Social media does not support photos in uniforms"],1,
"Think about what identifying information your school uniform reveals.",
"A school uniform clearly identifies which school you attend. This information combined with your face and name could allow a stranger to locate you and approach you at school. This is a real safety risk that is why schools advise against posting such photos.",
"School uniform = school location revealed. This is a safety risk that many students overlook.");

// ── ETHICS OF AI (15 questions) ─────────────────────────────────────────────
q(1,"Ethics of AI","What does the word ethics mean in the context of ICT?",
["The speed at which computers process data","Deciding what is right or wrong when using technology","Coding rules for software","The design of computer hardware","The language computers use"],1,
"Ethics comes from philosophy and is about moral choices.",
"Ethics refers to deciding what is right or wrong. In ICT, ethics involves thinking about how technology should be used responsibly, fairly, and without causing harm to people or society.",
"Ethics = right vs wrong. In ICT, it means using technology in a fair and responsible way.");

q(1,"Ethics of AI","What does AI stand for?",
["Automated Internet","Artificial Intelligence","Automatic Information","Advanced Integration","Animated Interface"],1,
"Think about what kind of intelligence comes from machines rather than humans.",
"AI stands for Artificial Intelligence. It refers to computer systems that can perform tasks that normally require human intelligence, such as recognizing faces, making decisions, translating languages, and playing games.",
"AI = Artificial Intelligence. Machines simulating human-like thinking.");

q(2,"Ethics of AI","Which of the following is an example of AI being used in everyday life?",
["A light switch","A pencil","A voice assistant like Siri or Alexa","A textbook","A wall clock"],2,
"Think about which item responds to you intelligently without being manually programmed for each response.",
"Voice assistants like Siri and Alexa use AI to understand natural language, interpret questions, and give relevant answers. The other items are non-digital or simple tools that do not use artificial intelligence.",
"Voice assistants, recommendation systems, and facial recognition are all everyday AI examples.");

q(2,"Ethics of AI","A self-driving car must choose between hitting one pedestrian or swerving and hitting three. Why is this an ethical problem?",
["Cars cannot make decisions","It is a math problem with a clear answer","The AI must make a moral choice about human lives, which is very difficult to program","Self-driving cars are illegal","The car should just stop"],2,
"Think about who is responsible for deciding whose life is saved.",
"This is called the trolley problem in AI. When a machine must choose between outcomes that harm people, we are asking it to make moral decisions. Programming those moral rules is deeply difficult, and it raises questions about who is responsible for the outcome.",
"AI making life-or-death decisions raises serious ethical questions about responsibility and values.");

q(2,"Ethics of AI","How could AI cause job losses?",
["AI makes people work harder","AI systems and robots can automate tasks previously done by humans, making some jobs unnecessary","AI creates more paperwork","AI increases the cost of hiring workers","AI makes offices more expensive"],1,
"Think about what automation means for human workers.",
"When AI or robots can perform tasks faster and more cheaply than humans, companies may replace human workers with machines. This is called automation. Jobs at risk include factory work, data entry, and even some services.",
"Automation by AI can eliminate certain jobs, especially repetitive ones. This is a key ethical concern.");

q(2,"Ethics of AI","What does it mean if an AI system is biased?",
["The AI system is too expensive","The AI system consistently makes unfair or inaccurate judgments about certain groups of people","The AI runs too slowly","The AI prefers certain colours","The AI was made in a specific country"],1,
"Think about what happens when the data used to train an AI is unbalanced.",
"An AI system is biased when it produces unfair or inaccurate results for certain groups of people. This often happens because the training data was not representative of all groups. For example, a facial recognition system trained mostly on one skin tone may work poorly for others.",
"AI bias comes from biased training data. Unfair data in = unfair results out.");

q(3,"Ethics of AI","Why might it be unfair if a person is fined by an AI system with no human review?",
["Fines should be cheaper","AI systems are always accurate","AI systems can make mistakes, and the person has no way to appeal to a fair human judge","AI systems are too slow to issue fines","Fines require cash payment"],2,
"Consider reliability, fairness, and the right to appeal.",
"AI systems can make errors, particularly when they encounter situations their training did not cover. If a fine is issued automatically with no human checking it, an innocent person may be punished unfairly with no way to appeal. Human review provides accountability.",
"AI decisions that affect people must have human oversight to be fair and accountable.");

q(2,"Ethics of AI","Which of the following is a potential benefit of AI technology?",
["It always costs less than humans","It replaces all humans with no drawbacks","It can perform dangerous tasks in place of humans, such as defusing bombs or entering burning buildings","It eliminates all privacy concerns","It never makes mistakes"],2,
"Think about tasks that are too dangerous or physically impossible for humans.",
"AI-powered robots can be used in environments that are too dangerous for humans, such as defusing explosives, exploring damaged nuclear plants, or entering burning buildings. This saves human lives and is a significant benefit of AI.",
"AI can protect human lives by taking on dangerous tasks that people should not have to do.");

q(3,"Ethics of AI","A company uses AI to hire employees. The AI was trained on historical data where most hired employees were male. What ethical problem could arise?",
["The AI will prefer older candidates","The AI might be biased against female candidates because the training data was unequal","The AI will always hire the most qualified person","There is no ethical problem","The AI will prefer candidates with more experience"],1,
"Think about what biased training data does to AI decisions.",
"If an AI hiring system was trained mostly on data from a time when men were hired more often, it may learn to favour male candidates even when female candidates are equally or more qualified. This is algorithmic bias and is a serious ethical and legal concern.",
"Biased training data creates biased AI outcomes. Equal, diverse training data is essential for fairness.");

q(2,"Ethics of AI","Why might AI technology increase the wealth gap between rich and poor?",
["Poor people prefer not to use technology","AI makes all products more expensive for everyone","Companies that own AI get richer while workers who lose jobs to automation become poorer","AI is only available in rich countries","Rich people are smarter at using AI"],2,
"Think about who owns AI systems and who loses jobs to them.",
"Companies that own AI systems benefit from increased productivity and reduced labour costs, making them richer. Meanwhile, workers whose jobs are automated may struggle to find new employment, widening the gap between wealthy companies and lower-income workers.",
"AI profits go to owners. Workers replaced by AI may face poverty. This can widen inequality.");

q(1,"Ethics of AI","Is it always easy to answer ethical questions about AI?",
["Yes, there is always a clear right answer","No, ethical questions about AI are often complex and difficult because they involve competing values","Yes, laws always give the answer","No, because AI cannot think","Yes, scientists have agreed on all ethical rules for AI"],1,
"Think about whether everyone agrees on what is right or wrong when AI is involved.",
"Ethical questions about AI are rarely simple. Different people have different values, and situations often involve trade-offs. For example, using AI for surveillance might improve safety but threaten privacy. Reasonable people can disagree.",
"Ethical questions have no single right answer. They require thoughtful discussion of values and trade-offs.");

q(3,"Ethics of AI","A student argues that AI should not be used in schools because it might give some students an unfair advantage. Is this a valid ethical argument?",
["No, AI is always fair","No, schools should use all technology","Yes, it raises genuine concerns about fairness and equal access that deserve serious consideration","No, AI is too simple to affect education","Yes, because AI is always harmful"],2,
"Think about the concept of fairness and equal access.",
"This is a valid ethical concern. If AI tools are only available to students with better devices or paid subscriptions, students from lower-income families may be disadvantaged. Questions of fairness and equal access are central to educational ethics.",
"Fairness and equal access are core ethical values. Technology that widens educational gaps raises real ethical concerns.");

q(2,"Ethics of AI","What is one way to reduce bias in an AI system?",
["Use less data for training","Train the AI using diverse and representative data from all groups","Let the AI make its own rules","Use faster processors","Avoid testing the AI"],1,
"The quality of AI output depends heavily on the quality of its training data.",
"Using diverse and representative data ensures the AI has examples from all groups of people and situations. This reduces the chance of the AI being systematically unfair to underrepresented groups.",
"Better training data = fairer AI. Diversity in data prevents discrimination in AI decisions.");

q(2,"Ethics of AI","A self-driving car company says its AI is 99% accurate. Why might this still be an ethical concern?",
["99% is not good enough to impress anyone","A 1% error rate in life-or-death driving situations could still cause serious injury or death","Self-driving cars are too expensive","99% accuracy means it never makes mistakes","The AI is too slow at 99%"],1,
"Think about what a 1% error rate means in millions of real driving situations.",
"Even a 1% error rate sounds small, but if millions of cars make one decision in a thousand wrong, the number of accidents could be very large. In situations where errors can kill people, even very high accuracy may not be sufficient without human backup.",
"In safety-critical systems, even small error rates can result in many deaths. This is a genuine ethical concern.");

q(3,"Ethics of AI","Why is it important for humans to remain involved in AI decision-making even when AI is highly accurate?",
["AI systems are always cheaper when humans are involved","Humans are always faster than AI","AI systems lack moral understanding and accountability, so human oversight ensures fairness and responsibility","AI does not work without humans","AI systems prefer to have humans check their work"],2,
"Think about what AI lacks that humans have.",
"Even highly accurate AI systems do not have genuine moral understanding or the ability to be held accountable. Human oversight ensures that decisions affecting people can be reviewed, appealed, and corrected. Accountability requires a human who can take responsibility.",
"AI can calculate but cannot truly understand ethics. Human oversight ensures accountability and fairness.");

// ── HTML (15 questions) ──────────────────────────────────────────────────────
q(1,"HTML","What does HTML stand for?",
["High Transfer Markup Language","HyperText Markup Language","HyperText Making Language","Home Transfer Markup Logic","HyperText Machine Learning"],1,
"Think about what hypertext means and what a markup language does.",
"HTML stands for HyperText Markup Language. It is the standard language used to create and structure content on web pages. HyperText refers to text with links, and Markup refers to the tags used to structure the content.",
"HTML = HyperText Markup Language. It is the foundation of every web page.");

q(1,"HTML","What is the purpose of HTML in web development?",
["To style the colours and fonts of a webpage","To describe and structure the content of web pages","To connect websites to databases","To make websites run faster","To protect websites from hackers"],1,
"HTML structures content. It describes what each piece of content is.",
"HTML describes the structure and content of a web page using tags. It tells the browser what each element is, for example whether it is a heading, a paragraph, or a link. CSS handles visual styling separately.",
"HTML = structure and content. CSS = style. JavaScript = behaviour. Each plays a different role.");

q(1,"HTML","Which tag is used to create the largest heading in HTML?",
["h6","head","h3","h1","title"],3,
"Heading tags in HTML go from h1 (largest) to h6 (smallest).",
"The h1 tag creates the largest and most important heading on a page. h2 is slightly smaller, and so on down to h6 which is the smallest heading. Search engines also treat h1 as the most important heading.",
"h1 is the biggest heading. h6 is the smallest. Lower number = bigger, more important heading.");

q(1,"HTML","Which tag is used to create a paragraph in HTML?",
["para","text","div","p","pg"],3,
"Think about the first letter of the word paragraph.",
"The p tag is used to define a paragraph in HTML. Content placed between the opening p tag and closing p tag is displayed as a block of text with spacing above and below it.",
"Use the p tag for paragraphs. It is one of the most commonly used HTML tags.");

q(1,"HTML","How does an HTML tag work?",
["Tags are written in plain English with no special symbols","Most content tags use an opening tag and a matching closing tag with a forward slash","Tags are optional and just for decoration","Tags are written at the bottom of the page only","HTML does not use tags"],1,
"Think about how tags are opened and closed around content.",
"Most HTML tags come in pairs: an opening tag like p and a closing tag like slash p. The content goes between them. The closing tag has a forward slash before the tag name to signal the end of that element.",
"Opening tag wraps content. Closing tag has a slash. Content goes in between.");

q(2,"HTML","Which of the following is a correct HTML tag for a hyperlink?",
["link href","a href equals url","url equals link","goto page","link to"],1,
"Hyperlinks in HTML use a specific tag and attribute to point to a web address.",
"In HTML, hyperlinks are created using the anchor tag written as a with the href attribute specifying the destination web address. The text between the opening and closing anchor tags is what the user clicks on.",
"The a tag with href creates hyperlinks. It is how web pages connect to each other.");

q(2,"HTML","Where does the main content of a web page go in the HTML structure?",
["Inside the head tag","Inside the title tag","Inside the body tag","Inside the html tag only","Inside the style tag"],2,
"HTML has two main sections. One is invisible to the user, one is visible.",
"The body section of an HTML document contains all the visible content of the webpage, such as headings, paragraphs, images, and links. The head section contains metadata and the page title, which are not directly visible on the page.",
"Head = behind the scenes. Body = what the user sees. Content goes in the body.");

q(2,"HTML","What is the purpose of the title tag in HTML?",
["It creates a large heading on the web page","It sets the text shown in the browser tab and search engine results","It makes text bold on the page","It links to another web page","It adds colour to the heading"],1,
"The title tag does not appear on the web page itself.",
"The title tag is placed inside the head section and defines the name of the web page that appears in the browser tab at the top. It also appears in search engine results and when you bookmark a page.",
"The title tag is in the head. It shows in the browser tab, not on the page itself.");

q(1,"HTML","What is the correct HTML tag to make text bold?",
["italic","u","strong","em","h1"],2,
"Think about which tag emphasizes text with bold weight.",
"The strong tag is used in HTML to make text bold and to indicate it is of strong importance. The em tag makes text italic. The u tag underlines text. Always use these semantic tags rather than just visual formatting.",
"strong = bold. em = italic. These are the standard HTML tags for text emphasis.");

q(2,"HTML","What is the correct way to add an image to an HTML page?",
["image source equals filename","use the photo tag","img tag with a src attribute pointing to the image file","picture equals filename","add a link to the image"],2,
"Images use a self-closing tag with an attribute pointing to the image file location.",
"The img tag is used to embed images in HTML. It is a self-closing tag (no separate closing tag needed) and uses the src attribute to specify the path or URL of the image file.",
"img tag + src attribute = how images are added in HTML. It is a self-closing tag.");

q(1,"HTML","What does a web browser do with HTML code?",
["It stores the code in the cloud","It sends the code to the printer","It reads the HTML tags and renders the page visually for the user","It converts HTML into images automatically","It emails the code to the website owner"],2,
"Think about what happens when you open a website.",
"A web browser reads the HTML code and renders (displays) the web page visually. It interprets the tags to know what is a heading, what is a paragraph, and what is a link, then displays the page accordingly for the user.",
"Browsers read HTML and render it as a visual page. HTML is the instruction; the browser follows it.");

q(3,"HTML","A student writes an HTML page but forgets the closing tag for a paragraph. What is likely to happen?",
["The computer will refuse to display the page","Nothing will change at all","The paragraph formatting may extend unintentionally into the rest of the page","The browser will crash","The page title will disappear"],2,
"Think about how browsers interpret missing closing tags.",
"When a closing tag is missing, the browser may interpret the rest of the page content as still being inside that element, which can cause formatting errors. Always close every tag that needs closing.",
"Missing closing tags cause layout bugs. Good habit: always close your tags.");

q(2,"HTML","Which HTML element creates an unordered (bullet point) list?",
["ol","li","dl","ul","list"],3,
"Think about the letter U in the tag name.",
"The ul tag creates an unordered list, which displays items with bullet points. The ol tag creates an ordered list with numbers. Each item in either type of list uses the li tag.",
"ul = unordered list (bullets). ol = ordered list (numbers). li = each list item.");

q(2,"HTML","What is the purpose of the head section in an HTML document?",
["To display headings on the web page","To contain all the visible content of the page","To hold metadata, the page title, and links to stylesheets","To store images and videos","To create the navigation menu"],2,
"The head is not visible on the page itself.",
"The head section holds information about the page rather than content for display. This includes the title tag, character set declarations, links to CSS files, and other metadata. None of this appears directly on the web page.",
"Head = page information. Body = page content. Users only see the body.");

q(3,"HTML","Why is HTML described as a markup language rather than a programming language?",
["Because it uses numbers instead of words","Because it only works on Windows computers","Because it uses tags to describe and structure content rather than giving instructions for logic or calculations","Because it was invented before programming","Because it only controls colours"],2,
"Think about what HTML actually does compared to what a programming language like Python does.",
"HTML uses tags to label and structure content (this is a heading, this is a paragraph) but it cannot perform calculations, make decisions, or create logic. Programming languages like Python do those things. This is why HTML is called a markup language, not a programming language.",
"HTML describes content. It does not compute or make decisions. That is the key difference from programming languages.");
