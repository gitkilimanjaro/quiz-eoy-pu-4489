<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai P5 Revisions Super Quiz</title>
<style>
  :root{
    --navy:#1a1a2e;
    --green:#2e7d32;
    --red:#c62828;
    --orange:#f57c00;
    --page:#f5f6fa;
    --card:#ffffff;
    --text:#1a1a2e;
    --muted:#6b6b7b;
    --shadow:0 2px 8px rgba(0,0,0,.08);
    /* topic colors */
    --t0:#2563eb; --t1:#0891b2; --t2:#7c3aed; --t3:#be185d;
    --t4:#ea580c; --t5:#0d9488; --t6:#a16207;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
    background:var(--page); color:var(--text);
    line-height:1.5; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px;min-height:100vh;}
  .hidden{display:none!important;}

  /* ---------- HOME ---------- */
  .topbar{display:flex;justify-content:flex-end;}
  .ver{font-size:.72rem;color:var(--muted);font-weight:600;}
  h1.title{font-size:1.7rem;font-weight:800;margin:.2rem 0 .8rem;color:var(--text);line-height:1.2;}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
  .pill{
    background:#fff;border:1.5px solid;border-radius:999px;
    padding:3px 10px;font-size:.72rem;font-weight:600;white-space:nowrap;
  }
  .card{
    background:var(--card);border-radius:12px;box-shadow:var(--shadow);
    padding:18px;margin-bottom:16px;
  }
  .stats{display:flex;gap:12px;text-align:center;margin-bottom:14px;}
  .stat{flex:1;}
  .stat .num{font-size:2rem;font-weight:800;line-height:1;}
  .stat .lbl{font-size:.72rem;color:var(--muted);margin-top:4px;}
  .stat.active .num{color:var(--orange);}
  .stat.done .num{color:var(--green);}
  .bar{height:10px;background:#e7e8ef;border-radius:6px;overflow:hidden;margin:6px 0 12px;}
  .bar>span{display:block;height:100%;background:var(--green);width:0;border-radius:6px;
    transition:width 1s cubic-bezier(.4,0,.2,1);}
  .howto{font-size:.82rem;color:var(--muted);}
  .btns{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700;}
  .btn-primary{background:var(--navy);color:#fff;padding:15px;font-size:1.05rem;width:100%;
    transition:transform .12s,opacity .12s;}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;}
  .btn-secondary{background:transparent;color:var(--red);border:1.5px solid var(--red);
    padding:11px;font-size:.92rem;width:100%;}
  .topics{display:grid;grid-template-columns:1fr;gap:10px;}
  .topics.two{grid-template-columns:1fr 1fr;}
  .topic{background:var(--card);border-radius:10px;box-shadow:var(--shadow);padding:12px;}
  .topic .tn{font-weight:700;font-size:.9rem;margin-bottom:2px;}
  .topic .half{font-size:.72rem;color:var(--orange);font-weight:700;margin-bottom:4px;}
  .topic .cnt{font-size:.74rem;color:var(--muted);margin-bottom:6px;}
  .tbar{height:7px;background:#e7e8ef;border-radius:5px;overflow:hidden;}
  .tbar>span{display:block;height:100%;width:0;border-radius:5px;transition:width .9s ease;}

  /* ---------- QUIZ ---------- */
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .badge{font-size:.74rem;font-weight:700;padding:4px 10px;border-radius:999px;color:#fff;}
  .qcount{font-size:.82rem;color:var(--muted);font-weight:600;}
  .qtext{font-size:1.25rem;font-weight:700;text-align:center;margin:10px 0 16px;line-height:1.4;}
  .hintwrap{margin-bottom:14px;text-align:center;}
  .hintbtn{background:#eef0f7;color:var(--navy);padding:8px 14px;font-size:.82rem;border-radius:8px;}
  .hintbox{margin-top:10px;background:#fff8ec;border:1px solid #f5d9a8;
    border-radius:8px;padding:10px 12px;font-size:.85rem;color:#8a5a00;text-align:left;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{
    background:var(--card);border:1.5px solid #dfe1ea;border-radius:10px;
    padding:14px;font-size:.98rem;text-align:left;width:100%;color:var(--text);
    transition:background .15s,border-color .15s,transform .12s;
  }
  .opt:active{transform:scale(.99);}
  .opt:disabled{cursor:default;}
  .opt.correct{background:#e7f4e8;border-color:var(--green);color:#1b4d1f;font-weight:700;}
  .opt.wrong{background:#fbe9e9;border-color:var(--red);color:#7d1c1c;}
  .feedback{margin-top:16px;}
  .expl{background:#f0f4ff;border-radius:8px;padding:12px;font-size:.88rem;margin-bottom:10px;}
  .insight{border:1.5px solid var(--navy);background:#f7f8fc;border-radius:8px;
    padding:12px;font-size:.86rem;}
  .insight b{color:var(--navy);}
  .nextbar{position:sticky;bottom:0;padding:14px 0 4px;background:linear-gradient(to top,var(--page) 70%,transparent);}

  /* ---------- RESULTS ---------- */
  .score{font-size:2.6rem;font-weight:800;text-align:center;color:var(--navy);}
  .scorelbl{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:14px;}
  .completebadge{background:#e7f4e8;color:var(--green);font-weight:700;text-align:center;
    padding:10px;border-radius:8px;margin-bottom:14px;font-size:.9rem;}
  table{width:100%;border-collapse:collapse;font-size:.84rem;}
  th,td{padding:8px 6px;text-align:left;border-bottom:1px solid #ececf2;}
  th{color:var(--muted);font-weight:600;font-size:.76rem;}
  td.c{text-align:center;}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,20,35,.6);display:flex;
    align-items:center;justify-content:center;padding:24px;z-index:50;}
  .modal{background:#fff;border-radius:14px;padding:24px;max-width:340px;width:100%;text-align:center;}
  .modal p{margin-bottom:18px;font-size:.95rem;}
  .modal .row{display:flex;gap:10px;}
  .modal button{flex:1;padding:12px;font-size:.9rem;border-radius:9px;}
  .m-cancel{background:#eceef4;color:var(--text);}
  .m-confirm{background:var(--red);color:#fff;}
  @media(max-width:380px){
    .topics.two .tn{font-size:.82rem;}
    .topics.two .topic{padding:10px;}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

   insight:"ขมิ้นกับปูน หมายถึง คนที่ไม่ถูกกัน เข้ากันไม่ได้ มักทะเลาะกัน"},
  {t:"สำนวนไทย",q:"การพยายามทำสิ่งที่ยากลำบากด้วยความอดทนไม่ยอมแพ้ ตรงกับสำนวนใด",
   o:["เข็นครกขึ้นภูเขา","นกน้อยทำรังแต่พอตัว","ตัดหางปล่อยวัด","ผักชีโรยหน้า"],a:0,
   h:"นึกถึงงานหนักที่ต้องใช้ความเพียรอย่างมาก",
   expl:"\"เข็นครกขึ้นภูเขา\" หมายถึงทำงานยากที่ต้องใช้ความพยายามอย่างสูง",
   insight:"เข็นครกขึ้นภูเขา หมายถึง การทำงานที่ยากลำบากต้องใช้ความเพียรพยายามมาก"},
  {t:"สำนวนไทย",q:"การใช้จ่ายอย่างประหยัด พอเหมาะกับฐานะของตน ตรงกับสำนวนใด",
   o:["นกน้อยทำรังแต่พอตัว","ตัดหางปล่อยวัด","ผักชีโรยหน้า","ปากหวานก้นเปรี้ยว"],a:0,
   h:"นึกถึงการทำสิ่งต่าง ๆ ให้พอดีกับกำลังตน",
   expl:"\"นกน้อยทำรังแต่พอตัว\" หมายถึงทำสิ่งต่าง ๆ ให้พอเหมาะกับฐานะ",
   insight:"นกน้อยทำรังแต่พอตัว หมายถึง ทำสิ่งต่าง ๆ ให้พอเหมาะกับฐานะและกำลังของตน"},
  {t:"สำนวนไทย",q:"การพึ่งพาตนเอง ไม่พึ่งพาผู้อื่น ตรงกับสำนวนใด",
   o:["ตนเป็นที่พึ่งแห่งตน","น้ำขึ้นให้รีบตัก","จับปลาสองมือ","ขมิ้นกับปูน"],a:0,
   h:"คำสอนเรื่องการช่วยเหลือตัวเอง",
   expl:"\"ตนเป็นที่พึ่งแห่งตน\" สอนให้พึ่งพาตนเองก่อนผู้อื่น",
   insight:"ตนเป็นที่พึ่งแห่งตน หมายถึง ควรพึ่งพาตนเอง ไม่หวังพึ่งผู้อื่นตลอดเวลา"},
];
BANK.forEach((q,i)=>q.id=i);

/* ---------- STATE ---------- */
function freshState(){
  const s={ledger:{}};
  BANK.forEach(q=>{ s.ledger[q.id]={streak:0,status:"active",lastCorrect:0}; });
  return s;
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return freshState();
    const s=JSON.parse(raw);
    if(!s||typeof s!=="object"||!s.ledger) return freshState();
    // ensure every bank id exists (in case bank grew)
    BANK.forEach(q=>{ if(!s.ledger[q.id]) s.ledger[q.id]={streak:0,status:"active",lastCorrect:0}; });
    return s;
  }catch(e){ return freshState(); }
}
function saveState(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(STATE)); }catch(e){} }
let STATE=loadState();

/* ---------- HELPERS ---------- */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function eligible(q){
  const L=STATE.ledger[q.id];
  if(L.status!=="active") return false;
  if(FINAL_PASS_SPACING_MS>0 && L.streak===STREAK_TO_MASTER-1){
    return Date.now()-L.lastCorrect>=FINAL_PASS_SPACING_MS;
  }
  return true;
}
function topicIndex(name){ return TOPICS.indexOf(name); }
function counts(){
  let active=0,mastered=0;
  BANK.forEach(q=>{ STATE.ledger[q.id].status==="mastered"?mastered++:active++; });
  return {active,mastered,total:BANK.length};
}
function topicStats(name){
  let mastered=0,total=0,half=0;
  BANK.forEach(q=>{
    if(q.t!==name) return;
    total++;
    const L=STATE.ledger[q.id];
    if(L.status==="mastered") mastered++;
    else if(L.streak>0) half++;
  });
  return {mastered,total,half};
}

/* ---------- SESSION ---------- */
let session=null;
function buildSession(){
  let pool=BANK.filter(eligible);
  // exit ramp: if not enough strictly-eligible, relax spacing rule
  if(pool.length<QS_PER_ROUND){
    const extra=BANK.filter(q=>STATE.ledger[q.id].status==="active" && !pool.includes(q));
    pool=pool.concat(extra);
  }
  pool=shuffle(pool).slice(0,Math.min(QS_PER_ROUND,pool.length));
  session={queue:pool,idx:0,correct:0,answered:false,
    topicStats:{}, drawn:pool.length};
  pool.forEach(q=>{
    if(!session.topicStats[q.t]) session.topicStats[q.t]={correct:0,drawn:0};
    session.topicStats[q.t].drawn++;
  });
}

/* ---------- RENDER: HOME ---------- */
const app=document.getElementById("app");
function renderHome(){
  const c=counts();
  const pct=c.total?Math.round(c.mastered/c.total*100):0;
  const pills=TOPICS.map((t,i)=>
    `<span class="pill" style="border-color:${TOPIC_COLORS[i]};color:${TOPIC_COLORS[i]}">${t}</span>`).join("");
  const twoCol=TOPICS.length>=7?"two":"";
  const topicCards=TOPICS.map((t,i)=>{
    const ts=topicStats(t);
    const tpct=ts.total?Math.round(ts.mastered/ts.total*100):0;
    const halfHtml=ts.half>0
      ? `<div class="half" title="ตอบถูกอีกครั้งเดียวก็จบ">▶${ts.half}</div>`:"";
    return `<div class="topic">
      <div class="tn" style="color:${TOPIC_COLORS[i]}">${t}</div>
      ${halfHtml}
      <div class="cnt">${ts.mastered}/${ts.total} ข้อ</div>
      <div class="tbar"><span style="width:${tpct}%;background:${TOPIC_COLORS[i]}"></span></div>
    </div>`;
  }).join("");
  const canContinue=c.active>0;

  app.innerHTML=`
    <div class="topbar"><span class="ver">${APP_VERSION}</span></div>
    <h1 class="title">${QUIZ_NAME}</h1>
    <div class="pills">${pills}</div>

    <div class="card">
      <div class="stats">
        <div class="stat active"><div class="num">${c.active}</div><div class="lbl">ข้อที่ยังเรียนอยู่</div></div>
        <div class="stat done"><div class="num">${c.mastered}</div><div class="lbl">เรียนจบแล้ว</div></div>
      </div>
      <div class="bar"><span id="mainbar"></span></div>
      <div class="howto">ตอบถูก ${STREAK_TO_MASTER} ครั้งติดต่อกันเพื่อเรียนจบข้อนั้น
      หากตอบผิดจะเริ่มนับใหม่ในข้อนั้น ทำให้ครบทั้ง ${c.total} ข้อเพื่อจบทั้งหมด</div>
    </div>

    <div class="btns">
      <button class="btn-primary" id="continueBtn" ${canContinue?"":"disabled"}>▶ ทำต่อ</button>
      <button class="btn-secondary" id="resetBtn">↺ เริ่มใหม่ทั้งหมด</button>
    </div>

    <div class="topics ${twoCol}">${topicCards}</div>
  `;
  // animate main bar
  requestAnimationFrame(()=>{ const b=document.getElementById("mainbar"); if(b) b.style.width=pct+"%"; });
  document.getElementById("continueBtn").onclick=()=>{ if(canContinue){ buildSession(); renderQuiz(); } };
  document.getElementById("resetBtn").onclick=renderResetModal;
}

/* ---------- RENDER: QUIZ ---------- */
function renderQuiz(){
  const q=session.queue[session.idx];
  const ti=topicIndex(q.t);
  const color=TOPIC_COLORS[ti];
  session.answered=false;
  const opts=shuffle(q.o.map((text,i)=>({text,correct:i===q.a})));

  app.innerHTML=`
    <div class="qhead">
      <span class="badge" style="background:${color}">${q.t}</span>
      <span class="qcount">ข้อ ${session.idx+1} จาก ${session.queue.length}</span>
    </div>
    <div class="qtext">${q.q}</div>
    <div class="hintwrap">
      <button class="hintbtn" id="hintBtn">💡 ดูคำใบ้</button>
      <div class="hintbox hidden" id="hintBox">${q.h}</div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="feedback hidden" id="feedback">
      <div class="expl"><b>เฉลย:</b> <span id="explText"></span></div>
      <div class="insight"><b>ประเด็นสำคัญ:</b> <span id="insightText"></span></div>
    </div>
    <div class="nextbar hidden" id="nextbar">
      <button class="btn-primary" id="nextBtn">ถัดไป →</button>
    </div>
  `;
  document.getElementById("hintBtn").onclick=function(){
    const box=document.getElementById("hintBox");
    box.classList.toggle("hidden");
    this.textContent=box.classList.contains("hidden")?"💡 ดูคำใบ้":"💡 ซ่อนคำใบ้";
  };
  const optsEl=document.getElementById("opts");
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="opt"; b.textContent=o.text;
    b.onclick=()=>answer(q,o,b,opts);
    optsEl.appendChild(b);
  });
}

function answer(q,chosen,btn,opts){
  if(session.answered) return;
  session.answered=true;
  const L=STATE.ledger[q.id];

  if(chosen.correct){
    L.streak++; L.lastCorrect=Date.now();
    if(L.streak>=STREAK_TO_MASTER) L.status="mastered";
    session.correct++;
    session.topicStats[q.t].correct++;
  }else{
    L.streak=0;
  }
  saveState(); // save immediately after every answer

  // highlight
  const btns=document.querySelectorAll(".opt");
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(opts[i].correct) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
  });
  document.getElementById("explText").textContent=q.expl;
  document.getElementById("insightText").textContent=q.insight;
  document.getElementById("feedback").classList.remove("hidden");
  const nb=document.getElementById("nextbar");
  nb.classList.remove("hidden");
  document.getElementById("nextBtn").onclick=()=>{
    session.idx++;
    if(session.idx>=session.queue.length) renderResults();
    else renderQuiz();
  };
}

/* ---------- RENDER: RESULTS ---------- */
function renderResults(){
  // count completed this session
  let completed=0;
  session.queue.forEach(q=>{ if(STATE.ledger[q.id].status==="mastered") completed++; });
  const rows=Object.keys(session.topicStats).map(t=>{
    const s=session.topicStats[t];
    const ti=topicIndex(t);
    return `<tr><td style="color:${TOPIC_COLORS[ti]};font-weight:600">${t}</td>
      <td class="c">${s.correct}</td><td class="c">${s.drawn}</td></tr>`;
  }).join("");

  app.innerHTML=`
    <h1 class="title">ผลรอบนี้</h1>
    <div class="card">
      <div class="score">${session.correct} / ${session.queue.length}</div>
      <div class="scorelbl">ตอบถูก</div>
      ${completed>0?`<div class="completebadge">+ เรียนจบ ${completed} ข้อในรอบนี้</div>`:""}
      <table>
        <thead><tr><th>หัวข้อ</th><th class="c">ถูก</th><th class="c">ออกในรอบนี้</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="btn-primary" id="contBtn">ทำต่อ →</button>
  `;
  document.getElementById("contBtn").onclick=renderHome;
}

/* ---------- RESET MODAL ---------- */
function renderResetModal(){
  const ov=document.createElement("div");
  ov.className="overlay";
  ov.innerHTML=`
    <div class="modal">
      <p>การกระทำนี้จะลบความคืบหน้าทั้งหมด คุณแน่ใจหรือไม่?</p>
      <div class="row">
        <button class="m-cancel" id="mCancel">ยกเลิก</button>
        <button class="m-confirm" id="mConfirm">ยืนยัน</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  document.getElementById("mCancel").onclick=()=>ov.remove();
  document.getElementById("mConfirm").onclick=()=>{
    try{ localStorage.removeItem(LS_KEY); }catch(e){}
    STATE=freshState(); saveState();
    ov.remove(); renderHome();
  };
}

/* ---------- INIT ---------- */
renderHome();
</script>
