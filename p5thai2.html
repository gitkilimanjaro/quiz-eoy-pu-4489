<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>แบบฝึกหัดภาษาไทย ป.5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Chonburi&display=swap');
  :root{
    --bg:#fff8ee; --paper:#fff8ee; --card:#ffffff; --ink:#23303a;
    --navy:#2c9b76;                /* primary action -> mint-dark (cute) */
    --mint:#3fb98f; --mint-d:#2c9b76; --coral:#ff6b6b; --sun:#ffce4f; --sky:#5aa9e6;
    --green:#2c9b76; --red:#e2574c; --orange:#f08a3c;
    --muted:#8a8071; --line:#e7dcc8;
    --t0:#5aa9e6; --t1:#3fb98f; --t2:#b07cd8; --t3:#ff8aae;
    --t4:#f3a13c; --t5:#5ec98f; --t6:#7aa5e6;
    --shadow:0 8px 26px rgba(40,60,55,.12);
    --fz:'Mali','Thonburi','Sukhumvit Set',-apple-system,sans-serif;
    --fd:'Chonburi','Thonburi','Sukhumvit Set',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--fz); color:var(--ink);
    background:
      radial-gradient(circle at 12% 6%, #ffe7a8 0 16%, transparent 16%),
      radial-gradient(circle at 90% 3%, #bfe7d6 0 13%, transparent 13%),
      radial-gradient(circle at 96% 55%, #ffd6cf 0 14%, transparent 14%),
      radial-gradient(circle at 4% 80%, #cfe4ff 0 12%, transparent 12%),
      var(--paper);
    background-attachment:fixed; min-height:100vh; line-height:1.55; padding:0 0 40px;
  }
  .app{max-width:520px; margin:0 auto; padding:16px}
  .ver{position:absolute; top:12px; right:16px; font-size:.74rem; color:var(--mint-d);
    font-weight:700; background:#fff; padding:3px 10px; border-radius:99px; box-shadow:var(--shadow)}
  h1{font-family:var(--fd); font-size:1.7rem; font-weight:400; margin:8px 0 2px; color:var(--mint-d);
    text-shadow:2px 2px 0 #fff, 3px 3px 0 var(--sun)}
  .sub{color:var(--muted); font-size:.92rem; margin:0 0 14px}

  /* topic pills */
  .pills{display:flex; flex-wrap:wrap; gap:7px; margin:12px 0 18px}
  .pill{font-size:.76rem; padding:5px 13px; border-radius:99px; background:#fff;
    border:2px solid; font-weight:700; white-space:nowrap; box-shadow:0 2px 8px rgba(40,60,55,.07)}

  /* cards */
  .card{background:var(--card); border-radius:20px; box-shadow:var(--shadow);
    border:2px solid var(--line); padding:18px; margin-bottom:16px}
  .stats{display:flex; gap:14px; margin-bottom:12px}
  .stat{flex:1; text-align:center}
  .stat .big{font-family:var(--fd); font-size:2.1rem; line-height:1}
  .stat .lbl{font-size:.8rem; color:var(--muted); margin-top:4px}
  .stat.active .big{color:var(--coral)}
  .stat.done .big{color:var(--mint-d)}
  .pbar{height:12px; background:#eadfca; border-radius:99px; overflow:hidden; margin:8px 0 10px}
  .pbar > i{display:block; height:100%; width:0;
    background:linear-gradient(90deg,var(--mint),var(--sky)); border-radius:99px; transition:width .6s ease}
  .hiw{font-size:.86rem; color:var(--muted); margin:8px 0 0}

  /* buttons */
  .btn{display:block; width:100%; border:none; border-radius:15px; padding:15px;
    font-family:var(--fz); font-weight:700; font-size:1.02rem; cursor:pointer; margin-bottom:11px; transition:.12s}
  .btn:active{transform:translateY(3px)}
  .btn.primary{background:var(--mint); color:#fff; box-shadow:0 5px 0 var(--mint-d)}
  .btn.primary:active{box-shadow:0 2px 0 var(--mint-d)}
  .btn.danger{background:#fff; color:var(--coral); border:2px solid var(--coral)}
  .btn.ghost{background:#f0e7d4; color:var(--ink)}

  /* topic grid */
  .topics{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  .topics.single{grid-template-columns:1fr}
  .tcard{background:var(--card); border-radius:16px; box-shadow:var(--shadow);
    border:2px solid var(--line); padding:13px}
  .tcard .tn{font-weight:700; font-size:.92rem; margin-bottom:6px}
  .tcard .meta{display:flex; align-items:center; gap:8px; font-size:.78rem; color:var(--muted); margin-bottom:7px}
  .half{color:var(--coral); font-weight:700}
  .tbar{height:8px; background:#eadfca; border-radius:99px; overflow:hidden}
  .tbar > i{display:block; height:100%; width:0; border-radius:99px; transition:width .6s ease}

  /* quiz screen */
  .qtop{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; padding:6px 2px}
  .qbadge{font-size:.76rem; font-weight:700; padding:4px 13px; border-radius:99px; border:2px solid; background:#fff}
  .qcount{font-size:.84rem; color:var(--muted); font-weight:700}
  #quiz, #results{animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .qtext{font-family:var(--fz); font-size:1.2rem; font-weight:700; text-align:center; margin:14px 6px 16px;
    background:var(--card); border:2px solid var(--line); border-radius:20px; padding:20px 18px; box-shadow:var(--shadow)}
  .hintwrap{margin-bottom:14px}
  .hintbtn{background:#fff6e0; color:#9a6a00; border:2px solid var(--sun); border-radius:13px;
    padding:11px 14px; font-family:var(--fz); font-weight:700; font-size:.9rem; cursor:pointer; width:100%}
  .hintbtn:active{transform:scale(.99)}
  .hintbox{display:none; margin-top:9px; background:#fff6e0; border-left:4px solid var(--sun);
    border-radius:10px; padding:12px 14px; font-size:.88rem; color:#7a5a00}
  .hintbox.show{display:block; animation:pop .25s}
  .opts{display:flex; flex-direction:column; gap:11px}
  .opt{display:flex; align-items:center; gap:12px; background:#fffdf8; border:2px solid var(--line);
    border-radius:16px; padding:14px 16px; font-size:1.04rem; cursor:pointer; transition:.15s;
    font-family:var(--fz); text-align:left; width:100%; color:var(--ink)}
  .opt:active{transform:scale(.98)}
  .opt .dot{flex:none; width:30px; height:30px; border-radius:50%; background:#f0e7d4;
    display:grid; place-items:center; font-weight:700; font-size:.9rem; color:var(--ink)}
  .opt.correct{background:#e8fbf2; border-color:var(--mint)}
  .opt.correct .dot{background:var(--mint); color:#fff}
  .opt.wrong{background:#ffeceb; border-color:var(--coral)}
  .opt.wrong .dot{background:var(--coral); color:#fff}
  .opt.locked{cursor:default; opacity:.97}
  .opt .mk{margin-left:auto; font-size:1.25rem; font-weight:800}

  /* feedback boxes */
  .expl{display:none; margin-top:14px; background:#eef7ff; border-left:4px solid var(--sky);
    border-radius:12px; padding:12px 14px; font-size:.9rem}
  .expl.show{display:block; animation:pop .25s}
  .expl b{color:var(--sky)}
  .insight{display:none; margin-top:11px; background:#f6f0ff; border:2px solid #e6d8f5;
    border-radius:12px; padding:12px 14px; font-size:.88rem}
  .insight.show{display:block; animation:pop .25s}
  .insight .k{font-weight:700; color:var(--t2); font-size:.76rem; letter-spacing:.02em; display:block; margin-bottom:4px}
  .next{display:none; width:100%; border:none; border-radius:15px; padding:15px; margin-top:16px;
    font-family:var(--fz); font-weight:700; font-size:1.04rem; color:#fff; background:var(--mint);
    box-shadow:0 5px 0 var(--mint-d); cursor:pointer}
  .next:active{transform:translateY(3px); box-shadow:0 2px 0 var(--mint-d)}
  .next.show{display:block}

  /* results */
  .score{font-family:var(--fd); font-size:2.4rem; text-align:center; color:var(--coral); margin:6px 0}
  .badge{text-align:center; background:#e8fbf2; color:var(--mint-d); border-radius:13px;
    padding:11px; font-weight:700; margin:10px 0; font-size:.92rem}
  table{width:100%; border-collapse:collapse; margin-top:10px; font-size:.88rem}
  th,td{text-align:left; padding:9px 6px; border-bottom:1px solid var(--line)}
  th{color:var(--muted); font-weight:700; font-size:.8rem}
  td.num,th.num{text-align:center}

  /* modal */
  .overlay{display:none; position:fixed; inset:0; background:rgba(40,50,45,.5); z-index:50;
    align-items:center; justify-content:center; padding:24px}
  .overlay.show{display:flex}
  .modal{background:#fff; border-radius:20px; padding:24px; max-width:340px; width:100%; text-align:center;
    box-shadow:var(--shadow); border:2px solid var(--line)}
  .modal p{font-size:1rem; margin:0 0 18px}
  .modal .row{display:flex; gap:10px}
  .modal .btn{margin:0}
  .hidden{display:none}
</style>
</head>
<body>
<div class="ver" id="ver">ver1.21</div>
<div class="app">

  <!-- HOME -->
  <section id="home">
    <h1 id="qname">แบบฝึกหัดภาษาไทย ป.5</h1>
    <p class="sub">ฝึกทบทวนทีละข้อ ตอบถูกติดกันครบก็ผ่าน</p>
    <div class="pills" id="pills"></div>

    <div class="card">
      <div class="stats">
        <div class="stat active"><div class="big" id="nActive">0</div><div class="lbl">ข้อที่ยังต้องฝึก</div></div>
        <div class="stat done"><div class="big" id="nDone">0</div><div class="lbl">ผ่านแล้ว</div></div>
      </div>
      <div class="pbar"><i id="homeBar"></i></div>
      <p class="hiw" id="hiw"></p>
    </div>

    <button class="btn primary" onclick="startSession()">▶ ทำต่อ</button>
    <button class="btn danger" onclick="openReset()">↺ เริ่มใหม่ทั้งหมด</button>

    <div class="topics" id="topics"></div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="qtop">
      <span class="qbadge" id="qbadge"></span>
      <span class="qcount" id="qcount"></span>
    </div>
    <div class="qtext" id="qtext"></div>
    <div class="hintwrap">
      <button class="hintbtn" id="hintbtn" onclick="toggleHint()">💡 ดูคำใบ้</button>
      <div class="hintbox" id="hintbox"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="expl" id="expl"></div>
    <div class="insight" id="insight"></div>
    <button class="next" id="next" onclick="nextQ()">ข้อต่อไป →</button>
  </section>

  <!-- RESULTS -->
  <section id="results" class="hidden">
    <div class="card">
      <h1 style="text-align:center">สรุปผลรอบนี้</h1>
      <div class="score" id="rScore"></div>
      <div class="badge hidden" id="rBadge"></div>
      <table id="rTable"></table>
    </div>
    <button class="btn primary" onclick="goHome()">ทำต่อ →</button>
  </section>
</div>

<!-- RESET MODAL -->
<div class="overlay" id="resetModal">
  <div class="modal">
    <p>การกระทำนี้จะลบความคืบหน้าทั้งหมด แน่ใจหรือไม่?</p>
    <div class="row">
      <button class="btn ghost" onclick="closeReset()">ยกเลิก</button>
      <button class="btn danger" onclick="doReset()">ลบเลย</button>
    </div>
  </div>
</div>

<script>

const QS_PER_ROUND = 16;
const STREAK_TO_MASTER = 2;
const FINAL_PASS_SPACING_MS = 10*60*1000; // 10 minutes
const VERSION = "ver1.21";
const TCOLORS = ["var(--t0)","var(--t1)","var(--t2)","var(--t3)","var(--t4)","var(--t5)","var(--t6)"];

function slugify(s){return s.replace(/\s+/g,'-').replace(/[^\w\-ก-๙]/g,'').toLowerCase();}
const LS_KEY = slugify(QUIZ_NAME)+"_v1";

// topics in order
const TOPICS=[]; BANK.forEach(q=>{if(!TOPICS.includes(q.t))TOPICS.push(q.t);});
const tColor=t=>TCOLORS[TOPICS.indexOf(t)%TCOLORS.length];

// ---- STATE ----
let state = loadState();
function freshState(){
  const led={};
  BANK.forEach(q=>led[q.id]={streak:0,status:"active",lastCorrect:0});
  return {ledger:led};
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return freshState();
    const p=JSON.parse(raw);
    if(!p||typeof p!=="object"||!p.ledger) return freshState();
    // ensure every bank id present (in case bank grew)
    BANK.forEach(q=>{ if(!p.ledger[q.id]) p.ledger[q.id]={streak:0,status:"active",lastCorrect:0}; });
    return p;
  }catch(e){ return freshState(); }
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

// ---- HOME ----
function renderHome(){
  document.getElementById('qname').textContent=QUIZ_NAME;
  document.getElementById('ver').textContent=VERSION;
  // pills
  const pills=document.getElementById('pills'); pills.innerHTML='';
  TOPICS.forEach(t=>{
    const c=tColor(t);
    const el=document.createElement('span'); el.className='pill';
    el.style.borderColor=c; el.style.color=c; el.textContent=t;
    pills.appendChild(el);
  });
  const total=BANK.length;
  let mastered=0; BANK.forEach(q=>{ if(state.ledger[q.id].status==="mastered") mastered++; });
  const active=total-mastered;
  document.getElementById('nActive').textContent=active;
  document.getElementById('nDone').textContent=mastered;
  document.getElementById('homeBar').style.width=(mastered/total*100)+'%';
  document.getElementById('hiw').textContent=
    `ตอบถูก ${STREAK_TO_MASTER} ครั้งติดกันเพื่อผ่านข้อนั้น ถ้าตอบผิดจะเริ่มนับใหม่ ทำให้ครบทั้งหมด ${total} ข้อเพื่อจบ`;
  // topics
  const wrap=document.getElementById('topics');
  wrap.className='topics'+(TOPICS.length<=6?' single':'');
  wrap.innerHTML='';
  TOPICS.forEach(t=>{
    const qs=BANK.filter(q=>q.t===t);
    const m=qs.filter(q=>state.ledger[q.id].status==="mastered").length;
    const half=qs.filter(q=>state.ledger[q.id].status==="active" && state.ledger[q.id].streak===STREAK_TO_MASTER-1 && STREAK_TO_MASTER>1).length;
    const c=tColor(t);
    const card=document.createElement('div'); card.className='tcard';
    card.innerHTML=`<div class="tn" style="color:${c}">${t}</div>
      <div class="meta">${half>0?`<span class="half" title="อีกครั้งเดียวก็ผ่าน">▶${half}</span>`:''}
        <span>${m}/${qs.length} ผ่าน</span></div>
      <div class="tbar"><i style="width:${m/qs.length*100}%;background:${c}"></i></div>`;
    wrap.appendChild(card);
  });
}

// ---- SESSION ----
let session=null;
function eligible(){
  const now=Date.now();
  return BANK.filter(q=>{
    const L=state.ledger[q.id];
    if(L.status!=="active") return false;
    if(STREAK_TO_MASTER>1 && L.streak===STREAK_TO_MASTER-1 && FINAL_PASS_SPACING_MS>0){
      return (now-L.lastCorrect)>=FINAL_PASS_SPACING_MS;
    }
    return true;
  });
}
function startSession(){
  let pool=eligible();
  // relief valve: if nothing eligible but active questions exist (held by spacing), allow them
  if(pool.length===0){
    const activeHeld=BANK.filter(q=>state.ledger[q.id].status==="active");
    if(activeHeld.length===0){ // truly all mastered
      renderHome(); alert("ยินดีด้วย! ทำครบทุกข้อแล้ว 🎉"); return;
    }
    pool=activeHeld; // ignore spacing as relief valve
  }
  // prioritise: questions with streak progress first, then shuffle
  shuffle(pool);
  const picked=pool.slice(0, Math.min(QS_PER_ROUND, pool.length));
  session={list:picked, i:0, correct:0, completedThis:0, drawn:{}, correctByTopic:{}};
  picked.forEach(q=>{ session.drawn[q.t]=(session.drawn[q.t]||0)+1; });
  show('quiz'); renderQ();
}
function renderQ(){
  const q=session.list[session.i];
  q._answered=false;            // reset per render so re-drawn questions stay clickable
  document.getElementById('qbadge').textContent=q.t;
  const c=tColor(q.t);
  const b=document.getElementById('qbadge'); b.style.borderColor=c; b.style.color=c;
  document.getElementById('qcount').textContent=`ข้อ ${session.i+1} / ${session.list.length}`;
  document.getElementById('qtext').textContent=q.q;
  // hint reset
  document.getElementById('hintbox').textContent=q.h;
  document.getElementById('hintbox').classList.remove('show');
  document.getElementById('hintbtn').style.display='block';
  // shuffled options
  const order=[...q.o.keys()]; shuffle(order);
  q._order=order;
  const opts=document.getElementById('opts'); opts.innerHTML='';
  order.forEach((origIdx,pos)=>{
    const btn=document.createElement('button'); btn.className='opt';
    btn.innerHTML=`<span class="dot">${pos+1}</span><span>${q.o[origIdx]}</span><span class="mk"></span>`;
    btn.onclick=()=>pick(origIdx,btn);
    opts.appendChild(btn);
  });
  document.getElementById('expl').classList.remove('show');
  document.getElementById('insight').classList.remove('show');
  document.getElementById('next').classList.remove('show');
  document.getElementById('next').textContent = (session.i+1>=session.list.length)?'ดูผลรอบนี้ →':'ข้อต่อไป →';
  window.scrollTo(0,0);
}
function toggleHint(){ document.getElementById('hintbox').classList.toggle('show'); }
function pick(origIdx, btn){
  const q=session.list[session.i];
  if(q._answered) return; q._answered=true;
  const opts=[...document.querySelectorAll('.opt')];
  opts.forEach(o=>o.classList.add('locked'));
  const L=state.ledger[q.id];
  const isCorrect = origIdx===q.a;
  // mark chosen + correct
  opts.forEach((o,pos)=>{
    const oi=q._order[pos];
    if(oi===q.a){ o.classList.add('correct'); o.querySelector('.mk').textContent='✓'; }
  });
  if(isCorrect){
    session.correct++;
    session.correctByTopic[q.t]=(session.correctByTopic[q.t]||0)+1;
    L.streak++; L.lastCorrect=Date.now();
    if(L.streak>=STREAK_TO_MASTER){ L.status="mastered"; session.completedThis++; }
  }else{
    btn.classList.add('wrong'); btn.querySelector('.mk').textContent='✕';
    L.streak=0;
  }
  save(); // immediately after every answer
  const e=document.getElementById('expl'); e.innerHTML='<b>เฉลย:</b> '+q.expl; e.classList.add('show');
  const ins=document.getElementById('insight'); ins.innerHTML='<span class="k">หลักการสำคัญ</span>'+q.insight; ins.classList.add('show');
  document.getElementById('hintbtn').style.display='none';
  document.getElementById('next').classList.add('show');
}
function nextQ(){
  session.i++;
  if(session.i>=session.list.length){ renderResults(); }
  else renderQ();
}

// ---- RESULTS ----
function renderResults(){
  document.getElementById('rScore').textContent=`${session.correct} / ${session.list.length} ข้อ`;
  const badge=document.getElementById('rBadge');
  if(session.completedThis>0){ badge.classList.remove('hidden'); badge.textContent=`✓ ผ่านเพิ่ม ${session.completedThis} ข้อในรอบนี้`; }
  else badge.classList.add('hidden');
  let rows='<tr><th>หัวข้อ</th><th class="num">ถูก</th><th class="num">ออกในรอบนี้</th></tr>';
  TOPICS.forEach(t=>{
    if(!session.drawn[t]) return;
    rows+=`<tr><td style="color:${tColor(t)}">${t}</td><td class="num">${session.correctByTopic[t]||0}</td><td class="num">${session.drawn[t]}</td></tr>`;
  });
  document.getElementById('rTable').innerHTML=rows;
  show('results');
}
function goHome(){ renderHome(); show('home'); }

// ---- RESET ----
function openReset(){ document.getElementById('resetModal').classList.add('show'); }
function closeReset(){ document.getElementById('resetModal').classList.remove('show'); }
function doReset(){ try{localStorage.removeItem(LS_KEY);}catch(e){} state=freshState(); save(); closeReset(); renderHome(); show('home'); }

// ---- UTIL ----
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function show(id){ ['home','quiz','results'].forEach(s=>document.getElementById(s).classList.toggle('hidden', s!==id)); }

renderHome();
</script>
</body>
