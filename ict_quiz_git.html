q(3,'Web Design',"A student creates a website with 15 colours, 8 fonts, and a different menu on every page. How many web design rules are broken, and which ones?",["No rules broken - variety is good","One rule: too many colours","Two rules: colours and fonts","Three rules: too many colours, too many fonts, and inconsistent navigation"],3,"Good web design has exactly three rules about colour, fonts, and consistency.","All three rules are broken: (1) 15 colours exceeds maximum of 3. (2) 8 fonts exceeds maximum of 3. (3) Different menu on each page breaks the common interface rule. Any one of these alone would be poor design.","3 rules broken: colour max, font max, consistent interface. All three must be followed.");
q(2,'Web Design',"What principle should guide all web design decisions above all else?",["Make it as complex as possible","Show the developer technical skill","Make it easy for visitors to find what they need - usability","Use as many features as possible"],2,"Web design is for the visitor, not the designer.","Good web design prioritizes usability - the ability for visitors to easily find information, navigate clearly, and have a positive experience. Even beautiful design fails if users cannot find what they need.","Usability = most important goal. Website exists for visitors not for showing technical skill.");
q(2,'Web Design',"A student wants to pick colours for their website. Which combination follows good web design rules?",["10 different bright colours for maximum visual impact","One dark colour and one light colour from opposite sides of the colour wheel","Random colours changed on every page to keep visitors interested","A single neon colour applied to every element on every page"],1,"Good design limits the palette and uses colours that work together harmoniously.","Good web design recommends using up to 3 colours (plus black and white) that work together. Using complementary colours - ones opposite each other on the colour wheel - creates visual harmony. Random colours on every page, 10 different colours, or a single harsh neon colour all break the rules.","Good colour: max 3, harmonious (complementary, analogous, or monochromatic). No random, no excessive variety.");

q(1,'e-Safety',"What is cyberbullying?",["Using a computer to play games online","Bullying that takes place through digital devices and online platforms","Learning to code on the internet","Sharing funny videos online"],1,"The prefix cyber refers to digital or internet-based activity.","Cyberbullying is the use of digital technology - social media, messaging apps, games - to bully, harass, threaten, or embarrass another person. It is just as serious as face-to-face bullying.","Cyberbullying = bullying through digital devices. Online location does not make it less serious.");
q(1,'e-Safety',"What is a digital footprint?",["Your internet connection speed","A physical stamp left on a keyboard","All information about you that exists online","The number of files on your computer"],2,"Think about the traces you leave every time you go online.","A digital footprint is all the data about a person that exists on the internet - posts, photos, comments, website history. It can affect your reputation now and in the future.","Digital footprint = all your online information. It can be permanent. Think before posting.");
q(2,'e-Safety',"What should you NEVER share with someone you have only met online?",["Your favourite colour","Your home address or school name","Your favourite sport","Your music preferences"],1,"Which information could allow someone to find you in real life?","You should never share home address, school name, phone number, or other identifying information with online strangers. This information could be used to locate or contact you in real life.","Never share location or contact info with online strangers. It can be used to find you.");
q(2,'e-Safety',"A student is being cyberbullied. What is the best course of action?",["Bully the person back","Keep it secret and hope it stops","Block the bully, save evidence (screenshots), and tell a trusted adult","Delete all social media accounts"],2,"Think about actions that actually stop the situation safely.","Best response: block the bully (stops contact), save evidence/screenshots (needed for reporting), tell a trusted adult (parent or teacher) who can help. Retaliating makes things worse.","Block + Save evidence + Tell trusted adult. Never retaliate or keep it secret.");
q(1,'e-Safety',"Someone online asks you to keep your conversations secret from your parents. What should you do?",["Keep the secret if they seem friendly","Keep it private - privacy is important","Tell a trusted adult immediately - this is a warning sign of grooming","Only keep secret if they are same age"],2,"Asking to keep secrets from parents is a major warning sign.","Asking young people to keep secrets from parents is a classic grooming tactic. A genuine friend would never ask this. Tell a trusted adult immediately regardless of how friendly the person seems.","Secrecy from parents = major warning sign. Tell a trusted adult immediately. Non-negotiable.");
q(1,'e-Safety',"Why should you log out of accounts on shared or public computers?",["Makes computer faster for next user","Saves battery power","Prevents the next person from accessing your accounts","Protects computer from viruses"],2,"Think about what happens to your account if you stay logged in on a shared computer.","Staying logged in on a shared computer allows the next person to access your account, read messages, and use your personal information. Always log out completely from shared devices.","Shared computer + not logged out = anyone can access your account. Always log out.");
q(1,'e-Safety',"A new online friend asks to meet you alone in a quiet place. What should you do?",["Go alone since you have been talking for weeks","Meet them but bring your phone","Never agree to meet online strangers alone - tell a trusted adult","Accept if they send a photo first"],2,"People online can lie completely about who they are. Meeting alone removes all safety.","Never meet an online stranger alone. People can misrepresent themselves online. If you want to meet someone from online, you must involve a trusted adult and meet only in a very public place.","Never meet online strangers alone. Always involve a trusted adult. Online identities can be fake.");
q(2,'e-Safety',"What information is safe to share on a public social media profile?",["Home address","School name and class","Daily routine and schedule","Your favourite sports team"],3,"Which item cannot be used to identify or physically locate you?","Your favourite sports team reveals nothing about your location or identity. Address, school name, daily routine, and phone number can all be used by strangers to find or contact you.","Preferences and general interests are safe. Location and contact info are not.");
q(2,'e-Safety',"A classmate shares someone else private messages publicly without permission. As a witness, what should you do?",["Join in and share more","Ignore it - not your problem","Like the posts to see what happens","Report it to a teacher - witnessing cyberbullying creates a responsibility to act"],3,"Bystanders in cyberbullying situations have a responsibility too.","Witnessing cyberbullying creates a responsibility to report it to a teacher or trusted adult. Staying silent or participating makes you part of the problem. Sharing private messages without consent also violates privacy.","Witnesses to cyberbullying should report it. Silence = allowing it to continue.");
q(1,'e-Safety',"What does e-Safety stand for and what does it cover?",["Electronic Safety - staying safe when using electronic and digital technology","Emergency Safety - calling for help online","Email Safety - using only secure email","Education Safety - staying safe at school"],0,"The e in e-Safety refers to the same e as in email or e-commerce.","e-Safety = Electronic Safety. It covers all aspects of staying safe when using electronic and digital technology including internet, social media, gaming, messaging, and any digital platform.","e-Safety = Electronic Safety = safe use of any digital technology.");
q(1,'AI Ethics',"What does AI stand for?",["Automated Internet","Artificial Intelligence","Advanced Integration","Animated Interface"],1,"AI refers to machines that simulate human-like thinking and decision-making.","AI = Artificial Intelligence. It refers to computer systems designed to perform tasks that typically require human intelligence - recognizing speech, making decisions, learning from data.","AI = Artificial Intelligence. Machines that can perform tasks requiring human-like intelligence.");
q(1,'AI Ethics',"What is AI bias?",["When AI works too fast","Errors in AI output because not enough correct or representative data was used to train it","When AI replaces human workers","When AI is programmed by one person"],1,"Think about what happens when the data used to train an AI is incomplete or unbalanced.","AI bias occurs when an AI produces unfair or inaccurate results because training data was not representative. The revision guide defines it as: errors because not enough correct data is loaded.","AI bias = bad or unrepresentative training data leads to unfair results. From revision guide.");
q(1,'AI Ethics',"What is Utilitarianism as applied to AI ethics?",["Always follow the law regardless of consequences","Making the decision that reduces the most harm and produces most good for most people","Maximizing profit for technology companies","Protecting individual rights above all else"],1,"Utilitarianism is about maximum benefit for the most people.","Utilitarianism is a moral philosophy saying the right action produces the greatest good for the most people, or reduces the most total harm. Key concept from the AI ethics class.","Utilitarianism = reduce most harm / benefit most people. Key exam concept from class.");
q(2,'AI Ethics',"In the trolley problem applied to AI and self-driving cars, what does Utilitarianism say the car should do?",["Do whatever keeps the car going straight - never change direction","Stop completely even if that causes more harm overall","Choose the action that causes the least total harm to the fewest people","Always protect the passenger inside the car above everyone else"],2,"Utilitarianism is about reducing the most overall harm possible.","Utilitarianism means choosing the action that reduces the most overall harm. The Utilitarian answer is whichever option causes the least total harm. It is not always about swerving; it is about whichever option causes the least harm overall.","Utilitarianism = reduce the most overall harm. The correct choice depends on the scenario. Always pick the option with fewest people harmed.");
q(1,'AI Ethics',"What is the primary definition of ethics?",["A set of legal rules made by governments","A mathematical concept","A philosophical study of what is right and wrong","A technology design guideline"],2,"Ethics is a branch of philosophy, not law or technology.","Ethics is a philosophical study of morality - what is right and wrong and how we should act. In ICT, ethics involves considering the moral implications of how technology is used.","Ethics = philosophical study of right and wrong. Not law, not rules - philosophy.");
q(2,'AI Ethics',"A company uses AI to screen job applications. The AI was trained mostly on data where successful applicants were male. What problem might occur?",["AI will prefer female candidates to compensate","AI might unfairly favour male candidates because training data was biased","AI will always pick most qualified regardless of gender","AI will refuse to process applications"],1,"Biased training data produces biased AI decisions.","If the AI learned from data where most successful hires were male, it may associate being male with being a good candidate - even when irrelevant. This is algorithmic bias causing unfair outcomes.","Biased training data = biased AI decisions. Historical unfairness gets encoded into AI systems.");
q(2,'AI Ethics',"Which jobs are most at risk of being replaced by AI and automation?",["Surgeons and artists","Philosophers and judges","Teachers and parents","Repetitive and routine jobs like factory work, data entry, and telemarketing"],3,"Think about which types of tasks computers find easiest to replicate.","Jobs involving repetitive predictable tasks - factory assembly, data entry, call centre work, telemarketing - are most at risk. Jobs requiring creativity, empathy, complex judgment, or unpredictable environments are harder for AI to replace.","Repetitive routine jobs = most at risk from AI. Creative and empathetic jobs = less at risk.");
q(2,'AI Ethics',"What percentage of jobs might be replaced by AI according to the class slides?",["10%","25%","40%","60%"],2,"This is a specific statistic from the class slides. ","According to the class slides, 40% of jobs could be replaced by AI. The correct answer is 40%.","40% of jobs at risk from AI. This is a specific statistic from the class slides.");
q(2,'AI Ethics',"How could AI lead to greater inequality between rich and poor?",["AI makes products more expensive for everyone","Poor people refuse to learn technology","Companies using AI profit more while workers whose jobs are automated may face unemployment","AI creates equal opportunities for everyone"],2,"Think about who owns AI systems and who loses jobs to automation.","Companies owning AI become more productive and profitable. Workers whose jobs are automated may face unemployment. This can widen the wealth gap - owners profit while lower-income workers lose livelihoods.","AI profit goes to owners. Automated workers face difficulty. Key AI ethics concern about inequality.");
q(2,'AI Ethics',"Which of the following is a genuine BENEFIT of AI technology?",["AI eliminates all human error","AI never makes mistakes","AI can perform tasks too dangerous for humans, like bomb disposal","AI gives everyone equal access to technology"],2,"Think about where AI can protect human lives by taking on dangerous roles.","A genuine benefit: AI can perform tasks too dangerous for humans - defusing explosives, inspecting damaged buildings, working in hazardous environments. This protects human lives.","AI in dangerous tasks = protects human lives. Genuine concrete benefit of AI technology.");
q(1,'AI Ethics',"Which of the following is a real-world AI application that also raises significant ethical dilemmas?",["A calculator performing arithmetic","A filing cabinet storing paper documents","A self-driving car that must make split-second ethical decisions during accidents","A light switch turning on automatically"],2,"The L3 Ethics lesson used self-driving cars as the main example of AI facing ethical decisions.","Self-driving cars are a key AI Ethics example from the class. They use AI to navigate and make decisions. The ethical dilemma arises when the car faces unavoidable accidents - it must decide who to protect, which is a Utilitarian decision programmed into the AI. Calculators, filing cabinets, and light switches do not involve ethical AI decision-making.","Self-driving cars = AI application with ethical dilemmas. The main example from the L3 Ethics lesson.");

q(3,'AI Ethics',"A student says AI should be banned from schools because it is always harmful. Is this a strong ethical argument?",["Yes, because AI is always harmful","No, because AI is always beneficial","No - the argument is too absolute. AI has both benefits and risks that must be weighed carefully","Yes, because students should not use technology"],2,"Strong ethical arguments consider multiple perspectives and avoid absolute claims.","This is a weak argument because it is absolute (always harmful) without evidence of benefits. Good ethical arguments acknowledge both sides: AI can cause harm (bias, plagiarism) but can also help (personalized learning, accessibility).","Strong ethics = avoid absolute claims. AI has benefits AND risks. Balance is key for good argument.");
q(1,'Excel',"What must ALL formulas in Excel begin with?",["A capital letter","The word formula","The equals sign =","A number"],2,"Without this, Excel treats the entry as text not a formula.","All Excel formulas must begin with = (equals sign). Without it, Excel treats what you type as plain text and does not calculate anything.","All formulas start with =. Without it, Excel sees text not a calculation. Always =.");
q(1,'Excel',"What does =SUM(D1:D10) calculate?",["Average of D1 to D10","Largest value in D1 to D10","Total of all values in cells D1 through D10","Number of cells in D1 to D10"],2,"SUM adds values together. The colon means from first to last cell.","=SUM(D1:D10) adds all numeric values in cells D1 through D10 and displays the total. The colon in D1:D10 means from D1 to D10 inclusive.","=SUM(range) = add all values in that range. D1:D10 = all cells from D1 to D10.");
q(1,'Excel',"What does =AVERAGE(D1:D10) calculate?",["Total of D1 to D10","Largest value in D1 to D10","Middle value in D1 to D10","Mean (arithmetic average) of all values in D1 through D10"],3,"AVERAGE finds the mean - sum divided by count of values.","=AVERAGE(D1:D10) calculates the arithmetic mean of all values in D1 through D10. It adds all values and divides by the count of values. Confirmed missing from previous quiz questions.","=AVERAGE(range) = (sum of all values) / (number of values) = mean. Different from SUM.");
q(1,'Excel',"What does =MIN(D1:D10) return?",["Total of all values","Average value","Smallest value in cells D1 through D10","Largest value"],2,"MIN means minimum - the lowest value.","=MIN(D1:D10) returns the smallest value found in D1 through D10. For example if cells contain 3,7,2,9,1, the MIN returns 1.","=MIN(range) = the smallest/lowest value. Think MIN = minimum.");
q(1,'Excel',"What does =MAX(D1:D10) return?",["Total of all values","Average value","Smallest value","Largest value in cells D1 through D10"],3,"MAX means maximum - the highest value.","=MAX(D1:D10) returns the largest value found in D1 through D10. For example if cells contain 3,7,2,9,1, the MAX returns 9.","=MAX(range) = the largest/highest value. Think MAX = maximum.");
q(1,'Excel',"What is a cell in a spreadsheet?",["A complete row of data","A complete column of data","The rectangular box where a row and column intersect","The toolbar at the top"],2,"Look at the grid - each individual box has a specific name.","A cell is the individual rectangular box formed by the intersection of a row and column. Each cell can hold text, numbers, or formulas. Cells are identified by column letter + row number.","Cell = one box in the spreadsheet grid. Where one column and one row meet.");
q(1,'Excel',"What is a cell address in Excel?",["The name of the entire workbook","The formula in the cell","The identifying name using column letter and row number, like B4","The color of the cell"],2,"Column letter comes first, then row number.","A cell address uniquely identifies each cell using column letter + row number. For example B4 means column B, row 4. Cell addresses are used in formulas.","Cell address = column letter + row number. Always column first: A1, B3, C10. Never 1A.");
q(2,'Excel',"A student types SUM(A1:A5) without an equals sign. What will Excel do?",["Calculate and display the sum","Display an error message","Treat it as plain text and not calculate","Ask student to add an equals sign"],2,"The equals sign tells Excel this is a formula, not text.","Without = at the start, Excel treats the entry as plain text. The cell shows SUM(A1:A5) literally, not the calculated result. This is a very common mistake.","No = sign = Excel sees text not a formula. Always start with = for any calculation.");
q(2,'Excel',"What does the colon in A1:A10 mean?",["Add A1 and A10 only","From A1 to A10 including all cells in between","A1 times A10","A1 divided by A10"],1,"In Excel, the colon creates a range from one cell to another.","The colon in A1:A10 means from cell A1 to cell A10 inclusive - including all cells between (A1 through A10). This is used in formulas to define a continuous range.","Colon = range from first to last cell inclusive. A1:A10 = all 10 cells. Not just two ends.");
q(2,'Excel',"A student needs the highest score in C2:C30. Which formula should they use?",["=SUM(C2:C30)","=MIN(C2:C30)","=AVERAGE(C2:C30)","=MAX(C2:C30)"],3,"Highest score = largest value = MAX.","=MAX(C2:C30) returns the highest (maximum) value in the range. =MIN gives lowest. =SUM gives total. =AVERAGE gives mean.","Highest value = MAX. Lowest value = MIN. Remember: MAX = maximum = biggest.");
q(2,'Excel',"A student deletes a value from B3 which was used in =SUM(B1:B5). What happens to the SUM result?",["Formula breaks and shows error","Nothing changes","SUM automatically recalculates to reflect the removed value","Cell turns red as warning"],2,"Spreadsheets automatically recalculate when data changes.","When a value used in a formula changes or is deleted, Excel automatically recalculates instantly. If B3 had 50 and is deleted, SUM result decreases by 50 immediately. This auto-recalculation is a key spreadsheet feature.","Auto-recalculation = formulas update instantly when data changes. This is why spreadsheets are powerful.");
q(3,'Excel',"Students have exam scores in C2:C31. They need highest score, lowest score, and class average. Which three formulas are needed?",["=TOP(C2:C31), =BOTTOM(C2:C31), =MEAN(C2:C31)","=HIGHEST(C2:C31), =LOWEST(C2:C31), =AVERAGE(C2:C31)","=MAX(C2:C31), =MIN(C2:C31), =AVERAGE(C2:C31)","=MAX(C2:C31), =LOW(C2:C31), =AVG(C2:C31)"],2,"Three different functions are needed. Remember exact Excel function names.","Correct: =MAX(C2:C31) for highest, =MIN(C2:C31) for lowest, =AVERAGE(C2:C31) for mean. Note: HIGHEST, LOWEST, MEAN, and AVG are NOT valid Excel functions.","MAX = highest, MIN = lowest, AVERAGE = mean. These are the exact Excel function names. Not MEAN or AVG.");
q(2,'Excel',"What does the formula bar show when a cell containing =SUM(A1:A10) is selected?",["The calculated number result","The word SUM","The formula =SUM(A1:A10) itself (not the result)","The range A1:A10 only"],2,"The formula bar shows the actual contents of the cell, including the formula itself.","The formula bar shows the actual formula =SUM(A1:A10) even though the cell displays the calculated result. This lets you see and edit the formula without deleting the result.","Formula bar = shows actual formula. Cell = shows calculated result. Two different views.");
q(2,'Excel',"What does AVERAGE do differently from SUM when applied to the same range?",["AVERAGE adds values and multiplies by 2","AVERAGE only works with non-zero values","AVERAGE divides the total by the count to find the mean while SUM only adds","They do exactly the same thing"],2,"Both use a range but produce completely different results.","SUM adds all values in a range. AVERAGE adds then divides by count to get the mean. For example SUM(2,4,6)=12 while AVERAGE(2,4,6)=4. They give very different results from the same data.","SUM = total. AVERAGE = total / count = mean. Very different results from same data.");
q(1,'Scratch',"What does the green flag do in Scratch?",["Stops the program","Pauses all sprites","Starts the program from the beginning","Saves the project"],2,"The green flag is the standard play button in Scratch.","The green flag starts the program. Clicking it runs all scripts beginning with when green flag clicked. The red stop button stops all scripts.","Green flag = start the program. All when green flag clicked scripts run when clicked.");
q(1,'Scratch',"What does a forever loop do in Scratch?",["Runs once only","Repeats a set number of times","Runs the blocks inside it continuously without stopping","Waits for a key press"],2,"Think about what the word forever implies.","A forever loop repeats the blocks inside it continuously, over and over, until the program is stopped with the red stop button. Used for continuous movement and checking for collisions.","Forever = runs continuously until stopped. Used for game loops, movement, and collision detection.");
q(1,'Scratch',"In the Lives game, what does set Lives to 3 do when the green flag is clicked?",["Adds 3 to current Lives","Multiplies Lives by 3","Sets the variable Lives to the starting value of 3","Checks if Lives equals 3"],2,"Set means assign a specific value to the variable at the start.","set [Lives] to [3] assigns the value 3 to the Lives variable. This initializes the starting value at the beginning of the game. Without this, the variable has no defined starting value.","set [variable] to [value] = give the variable a specific starting value at game start.");
q(2,'Scratch',"In the Lives game, what does change Lives by -1 do?",["Sets Lives to -1","Adds 1 to Lives","Subtracts 1 from the current value of Lives","Checks if Lives is negative"],2,"Change by a negative number means subtract that amount.","change [Lives] by [-1] subtracts 1 from the current Lives value. If Lives was 3, it becomes 2. This runs every time the Fish touches the Shark.","change [var] by -1 = subtract 1 from current value. Negative = decrease. Positive = increase.");
q(2,'Scratch',"In the Lives game, what does the touching Shark? block detect?",["When sprite is clicked by mouse","When a key is pressed","When the current sprite makes physical contact with the Shark sprite","When sprite reaches stage edge"],2,"Touching detects physical overlap between two sprites.","touching [Shark]? is a Sensing block that returns true when the current sprite (Fish) physically overlaps with the Shark sprite. Used to detect collisions in the game.","touching [sprite]? = collision detection. True when two sprites physically overlap.");
q(2,'Scratch',"What does the stop all block do?",["Stops only current sprite script","Saves the project","Pauses for 2 seconds","Stops all scripts in all sprites, ending the game"],3,"The all in stop all means everything.","stop all stops every script running in every sprite and the stage simultaneously. It effectively ends the game. In the Lives game it triggers when Lives reaches 0.","stop all = end the entire program. All scripts in all sprites stop immediately.");
q(2,'Scratch',"What does the broadcast change backdrop block do in the Lives game?",["Changes the fish sprite costume","Sends a message called change backdrop to all sprites and stage","Resets Lives to 3","Stops the Shark sprite only"],1,"Broadcast sends a message that other sprites and stage can receive.","broadcast [change backdrop] sends a message to all sprites and the stage. The stage has a when I receive [change backdrop] block that responds by switching to the Game Over backdrop.","broadcast = send a message. Other sprites/stage respond using when I receive.");
q(2,'Scratch',"In the stage script, what does when I receive change backdrop do?",["Broadcasts a message","Stops all sprites","Triggered when it receives the message, then switches backdrop to gameover","Hides all sprites"],2,"When I receive responds to a broadcast from another sprite.","when I receive [change backdrop] listens for the broadcast message. When Fish broadcasts it, this triggers and switches the stage backdrop to the gameover backdrop.","when I receive = listens for broadcast. Responds when another sprite sends that exact message.");
q(1,'Scratch',"What do the hide and show blocks do in Scratch?",["Delete and recreate the sprite","Move sprite offscreen","Make the sprite invisible (hide) or visible again (show)","Change sprite costume"],2,"Hide and show control visibility without deleting the sprite.","The hide block makes a sprite invisible without deleting it or stopping its scripts. The show block makes it visible again. In the Lives game, Fish hides when Lives reaches 0.","hide = invisible but still exists. show = visible again. Used for Game Over sequences.");
q(1,'Scratch',"In Scratch, what direction does the sprite face when point in direction 90 is used?",["Up","Left","Down","Right"],3,"In Scratch: 90 = right, -90 = left, 0 = up, 180 = down.","point in direction [90] makes the sprite face right. In the platformer project, pressing the right arrow key triggers this block. Scratch uses: 90=right, -90=left, 0=up, 180=down.","90 = right. -90 = left. 0 = up. 180 = down. Scratch direction system from lessons.");
q(2,'Scratch',"In the automatic movement project, point in direction 180 is used before gliding down. Why?",["180 means move faster","180 makes the sprite disappear","180 means pointing downward in Scratch, ensuring correct orientation before gliding","180 is the default direction"],2,"Remember the Scratch direction system from the lesson annotations.","direction 180 means pointing downward. The teacher annotated this directly: point in direction 180 to make sure direction is pointing down. A negative y-value in glide then moves the sprite downward.","direction 180 = pointing down. Teacher annotated this in the lesson screenshot.");
q(2,'Scratch',"What does the glide N secs to x: y: block do?",["Instantly moves the sprite to that position","Makes the sprite disappear at that position","Smoothly moves the sprite to the given coordinates over N seconds","Rotates sprite toward that position"],2,"Glide means smooth movement over time, not instant teleportation.","The glide [N] secs block smoothly moves the sprite from its current position to the specified x,y coordinates over the given number of seconds, creating smooth animation.","glide N secs = smooth movement to x,y over N seconds. Creates animation not instant movement.");
q(2,'Scratch',"In the platformer, the jump uses: if key up pressed AND jump counter less than 3. Why the jump counter condition?",["To count enemies defeated","To track score","To prevent infinite jumping by limiting jumps to 3","To control gravity speed"],2,"The teacher annotation explained this: The jump counter prevents the player from flying.","The jump counter limits how many times the player can jump. Without it, pressing up would make the character fly forever. Counter resets to 0 when the player lands on the floor.","Jump counter limits jumps to 3. Prevents flying bug. Teacher annotated this in the screenshot.");
q(2,'Scratch',"In the platformer, the script uses go to x: players x position y: players y position. What does this do?",["Saves the player position","Teleports player to start","Actually moves the sprite to the position calculated by the variables","Makes player jump"],2,"Variables track position but the sprite only moves when a motion block runs.","The teacher annotated: This is the line of code that actually moves the player. The if blocks change the position variables, but the sprite only visually moves when this go to x:y block executes.","Variables track position. go to x:y actually moves the sprite there. Both are needed.");
q(1,'Scratch',"What is a sprite in Scratch?",["The background image","A block of code","A character or object with its own scripts, costumes, and sounds","The stage area"],2,"Sprites are the characters and objects that move and interact.","A sprite is any character or object in a Scratch project that can move, have costumes (appearances), and run its own scripts. Examples from lessons: Player frog, Fish, Shark, Knight, Ghouls.","Sprite = character or object with its own scripts, costumes, and sounds.");
q(1,'Binary',"In computing, the base-10 number system we normally count with is called decimal. What is the ICT computing term for decimal?",["ASCII","Denary","Octal","Hexadecimal"],1,"Think about the British computing word for base-10. It starts with D.","Denary is the ICT and computing term for the decimal (base-10) number system. Both words mean the same thing - the number system using digits 0 through 9. The word denary appears frequently in computing exams.","Denary = decimal = base-10. Same meaning, different word. Know this term.");
q(1,'IO',"What is the typical storage capacity of a standard single-layer DVD-ROM disc?",["700 MB","1.5 GB","4.7 GB","250 GB"],2,"A CD-ROM holds 700 MB. A DVD is significantly larger. Think about fitting a movie on one disc.","A standard single-layer DVD-ROM holds 4.7 GB of data. A CD-ROM holds only 700 MB. A Blu-Ray disc holds 25 GB or more. The DVD larger capacity is why it replaced CDs for movies and large software.","DVD-ROM = 4.7 GB. CD-ROM = 700 MB. Know both storage capacities.");
q(2,'IO',"DVD-RW can be written to many times while DVD-R can only be written to once. What type of device is a DVD-RW?",["Input only - we can only read data from it","Output only - we can only copy data to it","Storage - it stores user data and other files","Neither input nor output"],2,"Which category holds data permanently - input, output, or storage?","A DVD-RW is a storage device. Both DVD-R and DVD-RW store data permanently. The difference is that RW (ReWritable) can be erased and rewritten many times, while R (Recordable) can only be written once. Both are storage devices regardless of write capability.","DVD-RW = storage device. RW means ReWritable. Both DVD types are storage.");
q(1,'IO',"Cloud computing services such as Google Drive and iCloud store your files on remote internet servers. What type of device is cloud computing classified as?",["Input","Output","Storage","Input and Output"],2,"Think about what you do with Google Drive - you store files on it remotely.","Cloud computing is classified as a storage device. Services like Google Drive, iCloud, and Dropbox store your files on remote servers connected to the internet. The data is stored remotely but functions exactly like any other storage device.","Cloud computing = Storage. Remote internet servers store your data. Same category as HDD and USB.");
q(1,'Scratch',"The block-based programming language Scratch is used mainly to make:",["worksheets","games","movies","presentation slides"],1,"Think about what Scratch projects look like - sprites, lives, scores, and movement.","Scratch is designed primarily for creating interactive games and animations. The block-based environment makes it easy to program sprites with movement, collision detection, scores, and lives - exactly the game mechanics covered in the lessons.","Scratch = used mainly to make games. All lesson projects were interactive games.");
q(1,'Scratch',"A Scratch script has: when flag clicked - forever - move 10 steps - if on edge bounce. What does the if on edge bounce block do?",["Makes the sprite bounce all over the screen randomly","Makes the sprite jump up and down","Makes the sprite bounce 10 times then stop","Reverses the direction of the sprite when it reaches the edge of the stage"],3,"Think about what bounce means physically - it changes direction. When does it trigger?","The if on edge bounce block checks whether the sprite has reached any edge of the stage. If it has, the sprite reverses direction. Combined with move 10 steps in a forever loop, this creates continuous back-and-forth movement across the stage automatically.","if on edge bounce = reverse direction when hitting any stage edge. Creates automatic back-and-forth movement.");
q(1,'HW',"What is the main function of an HDD (Hard Disk Drive) in a computer?",["To fetch startup instructions to the CPU when the computer is turned on","To cool the CPU when it gets too hot","To store operating system data, software data and user data","To execute instructions about which hardware performs what function"],2,"Think about what a hard drive does permanently - it stores everything long-term.","An HDD permanently stores operating system data (like Windows), software data (installed programs), and user data (documents, photos, videos). ROM stores startup instructions. A cooling fan cools the CPU. The Control Unit manages hardware instructions.","HDD = stores OS + software + user data permanently. Different from ROM which stores only startup instructions.");
q(1,'HW',"Realm of Valor, World of Warcraft, and League of Legends are examples of what?",["Hardware","Software","Input Devices","Output Devices"],1,"Games are programs that run on a computer. What category are programs?","Games like Realm of Valor, World of Warcraft, and League of Legends are all application software. They are programs (code) that run on hardware. You cannot physically touch them. Hardware is physical; software is code.","Games = application software. Programs that run on hardware. Cannot be touched.");
q(2,'Scratch',"Scratch code: when flag clicked, set Lives to 3, forever: if touching Dragon then change Lives by -1. After the forever loop runs exactly ONCE, how many lives does the player have?",["0","1","2","3"],2,"Lives starts at 3. The loop runs once and the sprite touches Dragon. 3 minus 1 equals what?","When the forever loop runs once and the sprite is touching Dragon, Lives changes by -1. Starting at 3: 3 + (-1) = 2. So the player has 2 lives remaining after the loop runs once.","Loop runs once: Lives = 3 - 1 = 2. Change by -1 means subtract 1 each time.");
q(2,'Scratch',"Scratch code: when flag clicked, set Lives to 3, forever: if touching Dragon then change Lives by -1. After the forever loop runs 3 times (touching Dragon each time), how many lives does the player have?",["The game ends automatically","0 lives left","6 lives left","1 life left"],1,"Lives starts at 3. Each of the 3 loop runs removes 1 life. 3 minus 3 equals what?","After 3 loop executions each reducing Lives by 1: 3 - 1 - 1 - 1 = 0. The player has 0 lives left. The game only ends automatically if a stop block is triggered when Lives reaches 0, which is not shown in this code.","Loop runs 3 times: Lives = 3 - 3 = 0 lives remaining.");
q(2,'Web Design',"Which of the following statements about web servers is true?",["All web servers are located in the United States","Your browser sends a request via the internet to the web server which sends the web page back","You can only view a website if its web server is in your country","There is one central storage location for all websites in the world"],1,"Think about how a web page gets from the server to your screen step by step.","Web pages are stored on web servers anywhere in the world. When you type a URL, your browser sends a request via the internet to that specific web server. The server then sends the HTML and other files back to your browser to display. There is no central storage - each website has its own server.","Web server stores pages and sends them to your browser on request. Servers are worldwide, not in one location.");
q(2,'Binary',"What is the decimal value of the binary number 11011001?",["208","217","327","218"],1,"Find all the 1s: positions 128, 64, 16, 8, and 1. Add only those values.","11011001: 1 at 128, 1 at 64, 0 at 32, 1 at 16, 1 at 8, 0 at 4, 0 at 2, 1 at 1. Total: 128+64+16+8+1 = 217. Always add only the positions where the bit is 1.","11011001 = 128+64+16+8+1 = 217. This binary value appeared in the mock test.");
q(2,'Binary',"What is the decimal number 19 in binary?",["10001","10101","11001","10011"],3,"19 = 16 + 2 + 1. Find which binary positions cover those values.","19: Does 16 fit? Yes (19-16=3). Does 8 fit? No. Does 4 fit? No. Does 2 fit? Yes (3-2=1). Does 1 fit? Yes. Result: 00010011, written as 10011. Verify: 16+2+1 = 19.","19 = 16+2+1 = 10011. Subtract the largest fitting place value each time.");
q(1,'HTML',"In HTML, the title tag opens an element and the closing title tag ends it. In the code: title-Welcome to Rama IX-closing-title, what does the closing title tag signal?",["Removes the title text from the web page","Creates a new title section below","Marks the end of the title element","Adds a comment so the title can be edited later"],2,"Every HTML opening tag needs a matching closing tag. What does the closing tag signal to the browser?","The closing title tag marks the end of the title element. Every HTML element with an opening tag needs a matching closing tag to show where the content ends. The text between the opening and closing tags is the actual title shown in the browser tab.","Closing tag = marks the END of the element. Content goes between opening and closing tags.");
q(1,'Binary',"There are 8 bits in 1 byte. How many bits are there in 24 bytes?",["3","4","24","192"],3,"To convert bytes to bits multiply by 8. What is 24 multiplied by 8?","8 bits per byte multiplied by 24 bytes equals 192 bits. To convert bytes to bits always multiply by 8. To convert bits to bytes divide by 8. So 1 byte = 8 bits, 10 bytes = 80 bits, 24 bytes = 192 bits.","Bytes to bits: multiply by 8. 24 x 8 = 192 bits. To go back: divide by 8.");


// &#9472;&#9472; PROGRESS STORAGE &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
var PROGRESS_KEY = "ict_g7_progress_v1";

function loadLedger() {
  try {
    var raw = localStorage.getItem(PROGRESS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveLedger(ledger) {
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(ledger)); } catch(e) {}
}

function getRecord(ledger, id) {
  if (!ledger[id]) ledger[id] = {streak:0, status:"active"};
  return ledger[id];
}

function activePool() {
  var ledger = loadLedger();
  return POOL.filter(function(q, i) {
    var rec = ledger[i] || {streak:0, status:"active"};
    return rec.status !== "mastered";
  });
}

function masteredCount() {
  var ledger = loadLedger();
  var count = 0;
  for (var i = 0; i < POOL.length; i++) {
    var rec = ledger[i] || {status:"active"};
    if (rec.status === "mastered") count++;
  }
  return count;
}

function hasProgress() {
  var ledger = loadLedger();
  for (var k in ledger) {
    if (ledger[k].streak > 0 || ledger[k].status === "mastered") return true;
  }
  return false;
}

// &#9472;&#9472; HOME SCREEN &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function refreshHome() {
  var total = POOL.length;
  var m = masteredCount();
  var active = total - m;
  var pct = Math.round((m / total) * 100);

  document.getElementById("h-active").textContent = active;
  document.getElementById("h-mastered").textContent = m + " (" + pct + "% Complete)";
  document.getElementById("h-bar").style.width = pct + "%";
  document.getElementById("h-pct").textContent = pct + "% mastered";

  // topic breakdown
  var ledger = loadLedger();
  var topics = {};
  var TP_COLOUR = {
    "CPU":"cpu","HW":"hw","IO":"io","Binary":"bin","Addition":"add",
    "e-Safety":"safe","AI Ethics":"ai","HTML":"html","CSS":"css",
    "Web Design":"web","Excel":"xl","Scratch":"sc"
  };
  var TP_ORDER = ["CPU","HTML","Binary","HW","CSS","Scratch","IO","Addition","Excel","Web Design","AI Ethics","e-Safety"];
  POOL.forEach(function(q, i) {
    if (!topics[q.tp]) topics[q.tp] = {total:0, mastered:0, streak1:0};
    topics[q.tp].total++;
    var rec = ledger[i] || {status:"active", streak:0};
    if (rec.status === "mastered") {
      topics[q.tp].mastered++;
    } else if (rec.streak === 1) {
      topics[q.tp].streak1++;
    }
  });

  var grid = document.getElementById("topic-grid");
  grid.innerHTML = "";
  var colA = document.createElement("div");
  colA.className = "topic-col";
  var colB = document.createElement("div");
  colB.className = "topic-col";
  TP_ORDER.forEach(function(tp, tpIdx) {
    var t = topics[tp];
    if (!t) return;
    var done = t.mastered === t.total;
    var pct = Math.round((t.mastered / t.total) * 100);
    var colKey = TP_COLOUR[tp] || "cpu";

    var row = document.createElement("div");
    row.className = "topic-row";
    row.innerHTML =
      '<div class="topic-row-top">' +
        '<span class="topic-label tp-' + colKey + '-c">' + tp + '</span>' +
        '<span class="topic-s1' + (t.streak1 === 0 ? " hidden" : "") + '">' +
          '<span class="topic-s1-icon">&#9658;</span>' + t.streak1 +
        '</span>' +
        '<span class="topic-frac' + (done ? " done" : "") + '">' +
          t.mastered + "/" + t.total +
        '</span>' +
      '</div>' +
      '<div class="topic-pb-bg">' +
        '<div class="topic-pb-fill tp-' + colKey + '-bg" style="width:' + pct + '%"></div>' +
      '</div>';
    if (tpIdx % 2 === 0) { colA.appendChild(row); } else { colB.appendChild(row); }
  });
  grid.appendChild(colA);
  grid.appendChild(colB);

  var btnC = document.getElementById("btn-continue");
  if (active === 0) {
    btnC.textContent = "All Questions Mastered!";
    btnC.disabled = true;
  } else {
    btnC.textContent = "Continue Progress (" + active + " remaining)";
    btnC.disabled = false;
  }
}

function confirmReset() {
  var ok = confirm("Are you sure you want to completely wipe your mastery history and start fresh?");
  if (ok) {
    try { localStorage.removeItem(PROGRESS_KEY); } catch(e) {}
    refreshHome();
  }
}

// &#9472;&#9472; QUIZ STATE &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
var deck = [], cur = 0, rights = 0, wrongs = 0, hintCount = 0, hist = [];
var deckIndices = []; // global POOL indices for each deck item
var roundMastered = 0;

function shuffle(a) {
  var b = a.slice();
  for (var i = b.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}

function startRound() {
  var ap = activePool();
  if (ap.length === 0) { goHome(); return; }

  // Build active pool with global indices
  var ledger = loadLedger();
  var allActive = [], cpuActive = [];
  POOL.forEach(function(q, i) {
    var rec = ledger[i] || {status:"active"};
    if (rec.status !== "mastered") {
      var item = {q:q, idx:i};
      allActive.push(item);
      if (q.tp === "CPU") cpuActive.push(item);
    }
  });

  // Guarantee 2-3 CPU/RAM/ROM questions per round (if available)
  var cpuTarget = Math.min(cpuActive.length, Math.floor(Math.random()*2)+2); // 2 or 3
  var cpuPicked = shuffle(cpuActive).slice(0, cpuTarget);
  var cpuIdxSet = {};
  cpuPicked.forEach(function(x){ cpuIdxSet[x.idx] = true; });

  // Fill remaining slots from non-CPU active questions
  var otherActive = allActive.filter(function(x){ return !cpuIdxSet[x.idx]; });
  var otherPicked = shuffle(otherActive).slice(0, 16 - cpuPicked.length);

  // Merge and shuffle the final deck
  var combined = shuffle(cpuPicked.concat(otherPicked));
  deck = combined.map(function(x){return x.q;});
  deckIndices = combined.map(function(x){return x.idx;});

  cur = 0; rights = 0; wrongs = 0; hintCount = 0; hist = []; roundMastered = 0;

  document.getElementById("homescreen").style.display = "none";
  document.getElementById("rscreen").style.display = "none";
  document.getElementById("quizscreen").style.display = "block";
  document.getElementById("fixednext").style.display = "none";
  document.body.className = "";
  renderQ();
}

function renderQ() {
  var q = deck[cur];
  var total = deck.length;
  document.getElementById("qctr").textContent = "Question " + (cur+1) + " of " + total;
  document.getElementById("prog").style.width = ((cur/total)*100) + "%";
  document.getElementById("scr").textContent = rights;
  document.getElementById("scw").textContent = wrongs;
  document.getElementById("qnum").textContent = "Q" + (cur+1);

  var tp = document.getElementById("tpill");
  tp.textContent = q.tp; tp.className = "tpill " + (TP[q.tp]||"tp-hw");

  var dp = document.getElementById("dpill");
  if (q.d===1){dp.textContent="Easy";dp.className="dpill easy";}
  else if(q.d===2){dp.textContent="Medium";dp.className="dpill medium";}
  else{dp.textContent="Hard";dp.className="dpill hard";}

  document.getElementById("qtext").textContent = q.text;

  var oc = document.getElementById("opts"); oc.innerHTML = "";
  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.createElement("button");
    btn.className = "opt"; btn.id = "opt"+i;
    var ol = document.createElement("span"); ol.className = "oletter"; ol.textContent = L[i];
    var ot = document.createElement("span"); ot.textContent = q.opts[i];
    btn.appendChild(ol); btn.appendChild(ot);
    btn.onclick = (function(idx){return function(){answerQ(idx);};})(i);
    oc.appendChild(btn);
  }

  document.getElementById("ebox").style.display = "none";
  document.getElementById("hbtn").style.display = "block";
  document.getElementById("hbtn").textContent = "Show hint";
  document.getElementById("hbox").style.display = "none";
  document.getElementById("hbox").textContent = q.hint;
  document.getElementById("etext").textContent = q.expl;
  document.getElementById("itext").textContent = "* " + q.insight;
  document.getElementById("fixednext").style.display = "none";
}

function answerQ(chosen) {
  var q = deck[cur];
  var globalIdx = deckIndices[cur];
  var opts = document.getElementById("opts").querySelectorAll(".opt");
  for (var i = 0; i < opts.length; i++) opts[i].onclick = null;

  var lbl = document.getElementById("rlabel");
  var correct = (chosen === q.ans);

  // progress update
  var ledger = loadLedger();
  var rec = getRecord(ledger, globalIdx);
  if (correct) {
    rec.streak++;
    if (rec.streak >= 2) {
      rec.status = "mastered";
      roundMastered++;
    }
    rights++;
    document.getElementById("opt"+chosen).classList.add("correct");
    hist.push("c");
    lbl.textContent = rec.status === "mastered" ? "Correct! Question mastered!" : "Correct!";
    lbl.className = "rlabel ok";
  } else {
    rec.streak = 0;
    wrongs++;
    document.getElementById("opt"+chosen).classList.add("wrong");
    document.getElementById("opt"+q.ans).classList.add("reveal");
    hist.push("w");
    lbl.textContent = "Wrong - answer was (" + L[q.ans] + ")";
    lbl.className = "rlabel ng";
  }
  saveLedger(ledger);

  document.getElementById("scr").textContent = rights;
  document.getElementById("scw").textContent = wrongs;
  document.getElementById("ebox").style.display = "block";
  document.getElementById("hbtn").style.display = "none";
  document.getElementById("hbox").style.display = "none";
  document.getElementById("fixednext").style.display = "block";
  document.body.className = "answered";
}

function toggleHint() {
  var hbox = document.getElementById("hbox"), hbtn = document.getElementById("hbtn");
  if (hbox.style.display === "none") {
    hbox.style.display = "block"; hbtn.textContent = "Hide hint"; hintCount++;
  } else {
    hbox.style.display = "none"; hbtn.textContent = "Show hint";
  }
}

function nextQ() {
  cur++;
  document.getElementById("fixednext").style.display = "none";
  document.body.className = "";
  if (cur >= deck.length) { showResult(); return; }
  renderQ();
  window.scrollTo(0,0);
}

function showResult() {
  document.getElementById("quizscreen").style.display = "none";
  document.getElementById("rscreen").style.display = "block";

  var total = deck.length;
  var pct = Math.round((rights/total)*100);
  document.getElementById("rscore").textContent = rights + " / " + total;
  document.getElementById("rbc").textContent = rights;
  document.getElementById("rbw").textContent = wrongs;
  document.getElementById("rbh").textContent = hintCount;
  document.getElementById("rbp").textContent = pct + "%";

  var dd = document.getElementById("dots"); dd.innerHTML = "";
  for (var i = 0; i < hist.length; i++) {
    var d = document.createElement("div");
    d.className = "dot " + hist[i]; dd.appendChild(d);
  }

  var msg;
  if (pct >= 90) msg = "Outstanding! You are very well prepared for the EOY exam.";
  else if (pct >= 75) msg = "Really good! Review the explanations for questions you missed.";
  else if (pct >= 55) msg = "Good effort. Read the explanations carefully and try a new round.";
  else msg = "Keep going. Focus on the weak topics and try again.";
  document.getElementById("rmsg").textContent = msg;

  var remaining = activePool().length;
  var m = masteredCount();
  var badge = document.getElementById("progress-badge");
  if (roundMastered > 0) {
    badge.textContent = "This round you mastered " + roundMastered + " question" +
      (roundMastered > 1 ? "s" : "") + "! " +
      remaining + " still active, " + m + " / " + POOL.length + " mastered total.";
  } else {
    badge.textContent = "No new questions mastered this round. " +
      remaining + " active, " + m + " / " + POOL.length + " mastered total. Keep going!";
  }

  var btnA = document.getElementById("btn-another");
  if (remaining === 0) {
    btnA.textContent = "All Questions Mastered!";
    btnA.disabled = true;
  } else {
    btnA.textContent = "Another Round (" + remaining + " remaining)";
    btnA.disabled = false;
  }

  window.scrollTo(0,0);
}

function goHome() {
  document.getElementById("rscreen").style.display = "none";
  document.getElementById("quizscreen").style.display = "none";
  document.getElementById("homescreen").style.display = "block";
  document.getElementById("fixednext").style.display = "none";
  document.body.className = "";
  refreshHome();
  window.scrollTo(0,0);
}


window.onload = function() {
  refreshHome();
};
</script>
