{ t:"Electrical Systems", q:"A student tests objects to see which light a bulb in a circuit. The bulb lights for a metal spoon and a coin, but not for a plastic spoon or a wooden peg. What is the best conclusion?", o:["All the objects tested are good conductors of electricity","Metals conduct electricity, while plastic and wood do not","Only the coin can conduct electricity in the circuit","Plastic and wood conduct electricity better than metals do"], a:1, h:"Group the objects that lit the bulb against those that did not.", expl:"The metal objects let current flow and lit the bulb (conductors); the plastic and wood did not (insulators).", insight:"Metals are conductors; plastic and wood are insulators." },
{ t:"Electrical Systems", q:"Two bulbs are connected in parallel to one battery. How does their brightness compare to a single bulb on the same battery?", o:["Each bulb is about as bright as a single bulb would be","Each of the bulbs is much dimmer than a single bulb would be","Each bulb is far brighter than a single bulb would be","Neither bulb lights up at all when connected this way"], a:0, h:"In parallel, each bulb gets its own full path from the battery.", expl:"In parallel, each bulb has its own path to the battery, so each stays about as bright as a single bulb.", insight:"In a parallel circuit, each bulb stays about as bright as a single bulb." },
{ t:"Electrical Systems", q:"In a circuit, a switch is left open (not pressed). What happens to the bulb?", o:["The bulb lights brightly because the switch saves electricity","The bulb does not light because the circuit is not complete","The bulb lights dimly because only some current can flow","The bulb flashes on and off while the switch stays open"], a:1, h:"An open switch leaves a gap in the loop.", expl:"An open switch breaks the circuit, so no current flows and the bulb does not light.", insight:"An open switch breaks the circuit, so the bulb does not light." },
{ t:"Using Electricity", q:"Why is it dangerous to use an electrical appliance with a damaged wire that has bare metal showing?", o:["Touching the bare metal could let electricity flow through you","The bare metal makes the appliance run more slowly than usual","The damaged wire uses up far less electricity than a good one","The bare metal stops the appliance from switching on at all"], a:0, h:"Bare metal is a conductor — what could happen if you touch it?", expl:"Bare metal conducts electricity, so touching it could let current flow through your body and give a shock.", insight:"Exposed bare wires are dangerous because metal conducts electricity and can cause a shock." },
{ t:"Using Electricity", q:"A family wants to reduce the amount of electricity they use at home. Which action would best help?", o:["Leaving the television on standby all through the day and night","Switching off the air-conditioner and lights when leaving a room","Opening the fridge door often to check what is inside it","Using several heaters at once to warm the home faster"], a:1, h:"Saving electricity means not using it when it is not needed.", expl:"Turning off appliances and lights when they are not needed reduces the electricity used.", insight:"Switching off appliances and lights when not in use saves electricity." },
{ t:"Using Electricity", q:"Why should the metal pins of a plug never be touched when it is plugged into a working socket?", o:["The metal pins are usually far too hot to touch safely","Touching the pins makes the appliance stop working at once","The pins are coated with a harmful chemical that can burn","Electricity could flow from the pins through your body"], a:3, h:"What can flow through metal that is connected to a live socket?", expl:"The pins carry electricity when plugged in, so touching them could let current flow through your body and cause a shock.", insight:"Never touch a plug's metal pins when connected, as electricity can flow through you." },
];
BANK.forEach((q,i)=>q.id=i);

// ---------- CONFIG ----------
var QUIZ_NAME = "P5 Science Revision";
var QS_PER_ROUND = 16;
var STREAK_TO_MASTER = 2;
var FINAL_PASS_SPACING_MS = 30 * 60 * 1000;
var LS_KEY = "p5-science-revision_v1";
var VERSION = "ver2.03";

var TOPIC_ICON = {
  "Reproduction in Plants":"🌸",
  "Reproduction in Humans":"👶",
  "Water & Changes of State":"💧",
  "Water Cycle":"☔",
  "Plant Transport System":"🌿",
  "Respiratory System":"🫁",
  "Circulatory System":"❤️",
  "The Unit of Life (Cells)":"🔬",
  "Electrical Systems":"💡",
  "Using Electricity":"🔌"
};

var TOPIC_ORDER = [];
BANK.forEach(function(q){ if(TOPIC_ORDER.indexOf(q.t)<0) TOPIC_ORDER.push(q.t); });
var TOPIC_COLOR = {};
TOPIC_ORDER.forEach(function(t,i){ TOPIC_COLOR[t] = "var(--t"+(i%10)+")"; });

// ---------- STATE ----------
function freshState(){
  var s = { ledger:{} };
  BANK.forEach(function(q){ s.ledger[q.id] = { streak:0, status:"active", lastCorrect:0 }; });
  return s;
}
function loadState(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(!raw) return freshState();
    var s = JSON.parse(raw);
    if(!s || typeof s!=="object" || !s.ledger) return freshState();
    BANK.forEach(function(q){ if(!s.ledger[q.id]) s.ledger[q.id]={streak:0,status:"active",lastCorrect:0}; });
    return s;
  }catch(e){ return freshState(); }
}
function saveState(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); }catch(e){} }
var STATE = loadState();

// ---------- HELPERS ----------
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function byTopic(){
  var m={}; TOPIC_ORDER.forEach(function(t){m[t]={total:0,mastered:0,half:0};});
  BANK.forEach(function(q){
    var L=STATE.ledger[q.id]; var g=m[q.t]; g.total++;
    if(L.status==="mastered") g.mastered++;
    else if(L.streak>0) g.half++;
  });
  return m;
}
function counts(){
  var active=0,mastered=0;
  BANK.forEach(function(q){ if(STATE.ledger[q.id].status==="mastered") mastered++; else active++; });
  return {active:active, mastered:mastered, total:BANK.length};
}

// ---------- HOME ----------
function renderHome(){
  document.getElementById("verTag").textContent = VERSION;
  var c = counts();
  document.getElementById("activeN").textContent = c.active;
  document.getElementById("doneN").textContent = c.mastered;
  var pct = c.total ? Math.round(c.mastered/c.total*100) : 0;
  setTimeout(function(){ document.getElementById("homeBar").style.width = pct+"%"; }, 60);
  document.getElementById("howto").innerHTML =
    "Answer correctly <b>"+STREAK_TO_MASTER+"</b> times in a row to complete a question! 🌟 A wrong answer resets that question. Work through all <b>"+c.total+"</b> questions to finish your island!";

  var pills = document.getElementById("pills"); pills.innerHTML="";
  TOPIC_ORDER.forEach(function(t){
    var col=TOPIC_COLOR[t];
    var el=document.createElement("span"); el.className="pill";
    el.style.color=col; el.style.borderColor=col;
    el.textContent=(TOPIC_ICON[t]||"")+" "+t;
    pills.appendChild(el);
  });

  var m = byTopic();
  var list = document.getElementById("topicList");
  list.className = "topics" + (TOPIC_ORDER.length>=7 ? " two" : "");
  list.innerHTML="";
  TOPIC_ORDER.forEach(function(t){
    var g=m[t], col=TOPIC_COLOR[t];
    var tp = g.total ? Math.round(g.mastered/g.total*100) : 0;
    var card=document.createElement("div"); card.className="topic";
    var half = g.half>0 ? '<span class="half" title="One more correct answer to complete these">&#9654;'+g.half+'</span>' : '';
    card.innerHTML =
      '<div class="tname" style="color:'+col+'"><span class="ic">'+(TOPIC_ICON[t]||"")+'</span>'+t+'</div>'+
      '<div class="meta">'+half+'<span>'+g.mastered+' / '+g.total+'</span></div>'+
      '<div class="tbar"><span style="background:'+col+'"></span></div>';
    list.appendChild(card);
    var bar=card.querySelector(".tbar>span");
    setTimeout(function(){ bar.style.width=tp+"%"; },60);
  });
}

// ---------- SESSION ----------
var session=null;
function eligible(){
  var now=Date.now(), out=[];
  BANK.forEach(function(q){
    var L=STATE.ledger[q.id];
    if(L.status!=="active") return;
    if(L.streak===STREAK_TO_MASTER-1 && FINAL_PASS_SPACING_MS>0){
      if(now - L.lastCorrect < FINAL_PASS_SPACING_MS) return;
    }
    out.push(q.id);
  });
  return out;
}
function startSession(){
  var pool = eligible();
  if(pool.length===0){
    BANK.forEach(function(q){ if(STATE.ledger[q.id].status==="active") pool.push(q.id); });
  }
  if(pool.length===0){
    alert("🎉 You've completed every question! Tap 'Start All Over' to play again.");
    return;
  }
  pool = shuffle(pool);
  var ids = pool.slice(0, Math.min(QS_PER_ROUND, pool.length));
  session = { ids:ids, i:0, correct:0, drawn:{}, completed:0, scoreByTopic:{} };
  show("quiz"); renderQuestion();
}
function renderQuestion(){
  var id = session.ids[session.i];
  var q = BANK[id];
  document.getElementById("feedback").style.display="none";
  var badge=document.getElementById("qBadge");
  badge.innerHTML='<span>'+(TOPIC_ICON[q.t]||"")+'</span>'+q.t;
  badge.style.color=TOPIC_COLOR[q.t]; badge.style.borderColor=TOPIC_COLOR[q.t];
  document.getElementById("qCount").textContent="Q "+(session.i+1)+" of "+session.ids.length;
  document.getElementById("qText").textContent=q.q;
  var hb=document.getElementById("hintBox"); hb.textContent=q.h; hb.className="hintbox";
  document.getElementById("hintBtn").style.display="inline-block";

  var order = shuffle([0,1,2,3]);
  var opts=document.getElementById("opts"); opts.innerHTML="";
  order.forEach(function(oi){
    var b=document.createElement("button"); b.className="opt"; b.textContent=q.o[oi]; b.type="button";
    var fired=false;
    var handle=function(e){ if(fired) return; fired=true; if(e&&e.preventDefault) e.preventDefault(); answer(oi, b, opts, q); };
    b.addEventListener("click", handle);
    b.addEventListener("touchend", handle);
    opts.appendChild(b);
  });
}
function answer(chosen, btn, opts, q){
  var L=STATE.ledger[q.id];
  var buttons=opts.querySelectorAll(".opt");
  buttons.forEach(function(b){ b.disabled=true; });
  var t=q.t;
  session.drawn[t]=(session.drawn[t]||0)+1;
  if(chosen===q.a){
    btn.classList.add("correct");
    session.correct++;
    session.scoreByTopic[t]=(session.scoreByTopic[t]||0)+1;
    L.streak++; L.lastCorrect=Date.now();
    if(L.streak>=STREAK_TO_MASTER && L.status!=="mastered"){ L.status="mastered"; session.completed++; }
  }else{
    buttons.forEach(function(b){ if(b.textContent===q.o[q.a]) b.classList.add("correct"); });
    btn.classList.add("wrong");
    L.streak=0;
  }
  saveState();
  document.getElementById("explBox").innerHTML="<b>Why:</b> "+q.expl;
  document.getElementById("insightBox").innerHTML="<b>⭐ Examiner insight:</b> "+q.insight;
  document.getElementById("feedback").style.display="block";
  document.getElementById("nextBtn").focus();
}
function nextQuestion(){
  session.i++;
  if(session.i>=session.ids.length) renderResults();
  else renderQuestion();
}

// ---------- RESULTS ----------
function renderResults(){
  document.getElementById("rScore").textContent=session.correct+" / "+session.ids.length;
  var ratio = session.ids.length ? session.correct/session.ids.length : 0;
  document.getElementById("cheer").textContent = ratio>=0.8 ? "🏆" : ratio>=0.5 ? "🎉" : "🌱";
  var badge=document.getElementById("rBadge");
  if(session.completed>0){ badge.style.display="block"; badge.textContent="🌟 "+session.completed+" question"+(session.completed>1?"s":"")+" completed this round!"; }
  else badge.style.display="none";
  var tb=document.getElementById("rTable"); tb.innerHTML="";
  var sbt=session.scoreByTopic||{};
  Object.keys(session.drawn).forEach(function(t){
    var tr=document.createElement("tr");
    tr.innerHTML='<td style="color:'+TOPIC_COLOR[t]+';font-weight:800">'+(TOPIC_ICON[t]||"")+' '+t+'</td>'+
      '<td class="n">'+(sbt[t]||0)+'</td><td class="n">'+session.drawn[t]+'</td>';
    tb.appendChild(tr);
  });
  show("results");
}

// ---------- NAV ----------
function show(id){
  ["home","quiz","results"].forEach(function(s){ document.getElementById(s).classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  if(id==="home") renderHome();
  window.scrollTo(0,0);
}

// ---------- EVENTS ----------
document.getElementById("continueBtn").onclick=startSession;
document.getElementById("continueStudy").onclick=function(){ show("home"); };
document.getElementById("nextBtn").onclick=nextQuestion;
document.getElementById("hintBtn").onclick=function(){
  document.getElementById("hintBox").classList.add("show"); this.style.display="none";
};
document.getElementById("resetBtn").onclick=function(){ document.getElementById("overlay").classList.add("show"); };
document.getElementById("mCancel").onclick=function(){ document.getElementById("overlay").classList.remove("show"); };
document.getElementById("mConfirm").onclick=function(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  STATE=freshState(); saveState();
  document.getElementById("overlay").classList.remove("show");
  show("home");
};

renderHome();
</script>
</body>
</html>
