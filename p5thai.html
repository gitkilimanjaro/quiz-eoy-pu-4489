<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>แบบฝึกหัดภาษาไทย ป.5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Chonburi&display=swap');
  :root{
    --ink:#23303a; --paper:#fff8ee; --card:#ffffff;
    --mint:#3fb98f; --mint-d:#2c9b76; --coral:#ff6b6b;
    --sun:#ffce4f; --sky:#5aa9e6; --line:#e7dcc8;
    --good:#3fb98f; --bad:#ff6b6b;
    --shadow:0 8px 26px rgba(40,60,55,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Mali','Thonburi','Sukhumvit Set',-apple-system,sans-serif; color:var(--ink);
    background:
      radial-gradient(circle at 12% 8%, #ffe7a8 0 18%, transparent 18%),
      radial-gradient(circle at 88% 4%, #bfe7d6 0 14%, transparent 14%),
      radial-gradient(circle at 95% 60%, #ffd6cf 0 16%, transparent 16%),
      var(--paper);
    background-attachment:fixed;
    min-height:100vh; line-height:1.55;
    padding:0 0 90px;
  }
  .wrap{max-width:640px; margin:0 auto; padding:16px}

  /* HEADER */
  .hero{text-align:center; padding:26px 16px 10px}
  .hero h1{font-family:'Chonburi','Thonburi','Sukhumvit Set',serif; font-size:1.85rem; margin:0; color:var(--mint-d);
    text-shadow:2px 2px 0 #fff, 3px 3px 0 var(--sun)}
  .hero p{margin:6px 0 0; font-size:.95rem; opacity:.75}

  /* SET PICKER */
  .sets{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:18px 0}
  .setbtn{
    background:var(--card); border:2px solid var(--line); border-radius:18px;
    padding:16px 8px; text-align:center; cursor:pointer; transition:.18s;
    box-shadow:var(--shadow); font-family:'Mali','Thonburi','Sukhumvit Set',sans-serif; font-weight:700;
  }
  .setbtn:active{transform:scale(.96)}
  .setbtn .n{font-family:'Chonburi'; font-size:1.6rem; color:var(--coral); display:block}
  .setbtn .lbl{font-size:.8rem; opacity:.7}
  .setbtn.done{border-color:var(--mint); background:#f0fbf6}
  .setbtn.done .n{color:var(--mint-d)}
  .setbtn .scr{font-size:.72rem; color:var(--mint-d); margin-top:3px; min-height:.9em}

  .intro{background:var(--card); border-radius:18px; padding:16px 18px; box-shadow:var(--shadow);
    border:2px solid var(--line); font-size:.92rem}
  .intro b{color:var(--mint-d)}

  /* PROGRESS */
  .topbar{position:sticky; top:0; z-index:20; background:rgba(255,248,238,.92);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); padding:10px 16px; display:flex; align-items:center; gap:10px}
  .back{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink);padding:4px 8px}
  .bar{flex:1; height:12px; background:#eadfca; border-radius:99px; overflow:hidden}
  .bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--mint),var(--sky));
    border-radius:99px; transition:width .35s}
  .count{font-size:.82rem; font-weight:700; opacity:.7; min-width:54px; text-align:right}

  /* QUESTION CARD */
  .qcard{background:var(--card); border-radius:22px; padding:22px 20px 18px;
    box-shadow:var(--shadow); border:2px solid var(--line); animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .tag{display:inline-block; font-size:.72rem; font-weight:700; color:#fff; background:var(--sky);
    padding:3px 12px; border-radius:99px; margin-bottom:10px}
  .tag.t2{background:var(--sun); color:#7a5a00}
  .tag.t3{background:var(--coral)}
  .qtext{font-size:1.18rem; font-weight:600; margin:4px 0 16px}
  .qtext u{text-decoration-color:var(--coral); text-decoration-thickness:3px; text-underline-offset:3px}
  .opts{display:flex; flex-direction:column; gap:11px}
  .opt{display:flex; align-items:center; gap:12px; background:#fffdf8; border:2px solid var(--line);
    border-radius:15px; padding:14px 16px; font-size:1.05rem; cursor:pointer; transition:.15s;
    font-family:'Mali','Thonburi','Sukhumvit Set',sans-serif; text-align:left; width:100%}
  .opt:active{transform:scale(.98)}
  .opt .dot{flex:none; width:30px; height:30px; border-radius:50%; background:#f0e7d4;
    display:grid; place-items:center; font-weight:700; font-size:.9rem; color:var(--ink)}
  .opt.correct{background:#e8fbf2; border-color:var(--good)}
  .opt.correct .dot{background:var(--good); color:#fff}
  .opt.wrong{background:#ffeceb; border-color:var(--bad)}
  .opt.wrong .dot{background:var(--bad); color:#fff}
  .opt.locked{cursor:default; opacity:.96}
  .opt .mark{margin-left:auto; font-size:1.25rem; font-weight:700}

  .note{margin-top:14px; background:#fff6e0; border-left:4px solid var(--sun); border-radius:8px;
    padding:10px 13px; font-size:.86rem; display:none}
  .note.show{display:block; animation:pop .25s}
  .expl{margin-top:12px; background:#eef7ff; border-left:4px solid var(--sky); border-radius:8px;
    padding:11px 14px; font-size:.9rem; display:none}
  .expl.show{display:block; animation:pop .25s}
  .expl b{color:var(--sky)}
  .next{margin-top:16px; width:100%; border:none; border-radius:15px; padding:15px;
    font-family:'Mali','Thonburi','Sukhumvit Set',sans-serif; font-weight:700; font-size:1.05rem; color:#fff; cursor:pointer;
    background:var(--mint); box-shadow:0 5px 0 var(--mint-d); transition:.1s; display:none}
  .next.show{display:block}
  .next:active{transform:translateY(3px); box-shadow:0 2px 0 var(--mint-d)}

  /* RESULT */
  .result{text-align:center; background:var(--card); border-radius:22px; padding:30px 22px;
    box-shadow:var(--shadow); border:2px solid var(--line); animation:pop .4s}
  .result .emoji{font-size:3.5rem}
  .result h2{font-family:'Chonburi'; color:var(--mint-d); margin:8px 0 2px}
  .ring{font-family:'Chonburi'; font-size:2.6rem; color:var(--coral); margin:6px 0}
  .msg{font-size:1rem; opacity:.8; margin-bottom:18px}
  .rbtns{display:flex; gap:10px}
  .rbtn{flex:1; border:none; border-radius:15px; padding:14px; font-family:'Mali','Thonburi','Sukhumvit Set',sans-serif; font-weight:700;
    font-size:1rem; cursor:pointer}
  .rbtn.primary{background:var(--mint); color:#fff; box-shadow:0 4px 0 var(--mint-d)}
  .rbtn.ghost{background:#f0e7d4; color:var(--ink)}
  .rbtn:active{transform:translateY(2px)}
  .hidden{display:none}
  .credit{text-align:center; font-size:.75rem; opacity:.5; margin-top:22px}
</style>
</head>
<body>
<div id="home">
  <div class="hero">
    <h1>ภาษาไทย ป.5</h1>
    <p>แบบฝึกหัดทบทวนก่อนสอบ • แตะเลือกคำตอบได้เลย</p>
  </div>
  <div class="wrap">
    <div class="intro">
      เลือกชุดที่อยากทำได้เลยจ้ะ 👇 แต่ละชุดมี <b>38 ข้อ</b> —
      ตอนที่ 1 เลือกคำตอบ, ตอนที่ 2 เปลี่ยนเป็นภาษาเขียน, ตอนที่ 3 เลือกสำนวน
      <br>แตะคำตอบแล้วจะรู้ทันทีว่าถูกหรือผิด ✅❌
    </div>
    <div class="sets" id="sets"></div>
    <div class="credit">ทำในรถได้ • ไม่ต้องใช้อินเทอร์เน็ต</div>
  </div>
</div>

<div id="quiz" class="hidden">
  <div class="topbar">
    <button class="back" onclick="goHome()">‹</button>
    <div class="bar"><i id="prog"></i></div>
    <span class="count" id="count"></span>
  </div>
  <div class="wrap"><div id="qhost"></div></div>
</div>

<script>

const L1="ตอนที่ 1 · เลือกคำตอบ", L2="ตอนที่ 2 · เปลี่ยนเป็นภาษาเขียน", L3="ตอนที่ 3 · เลือกสำนวน";
let cur=null, qs=[], idx=0, score=0, scores={};

function buildSets(){
  const host=document.getElementById('sets'); host.innerHTML='';
  DATA.forEach(d=>{
    const b=document.createElement('button'); b.className='setbtn'+(scores[d.set]!=null?' done':'');
    b.innerHTML=`<span class="n">${d.set}</span><span class="lbl">ชุดที่ ${d.set}</span>
      <div class="scr">${scores[d.set]!=null?('★ '+scores[d.set]+'/'+(d.p1.length+d.p2.length+d.p3.length)):''}</div>`;
    b.onclick=()=>startSet(d.set); host.appendChild(b);
  });
}
function startSet(n){
  cur=DATA.find(d=>d.set===n); qs=[];
  cur.p1.forEach(q=>qs.push({type:1,...q}));
  cur.p2.forEach(q=>qs.push({type:2,q:q.q,opts:q.opts,ans:q.ans,answer_text:q.answer_text}));
  cur.p3.forEach(q=>qs.push({type:3,...q}));
  idx=0; score=0;
  document.getElementById('home').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  window.scrollTo(0,0); render();
}
function goHome(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  buildSets();
}
function render(){
  const host=document.getElementById('qhost');
  const total=qs.length;
  document.getElementById('prog').style.width=(idx/total*100)+'%';
  document.getElementById('count').textContent=(idx+1)+' / '+total;
  if(idx>=total){ return showResult(); }
  const q=qs[idx];
  const tag = q.type===1?{c:'',t:L1} : q.type===2?{c:'t2',t:L2} : {c:'t3',t:L3};
  let optsHtml = q.opts.map((o,i)=>
    `<button class="opt" data-i="${i}" onclick="pick(${i})">
       <span class="dot">${i+1}</span>
       <span>${o}</span><span class="mark"></span>
     </button>`).join('');
  let prompt = q.type===2 ? q.q.replace(/<u>(.*?)<\/u>/,'<u>$1</u>') + '<br><span style="font-size:.92rem;opacity:.7">เปลี่ยนคำที่ขีดเส้นใต้เป็นภาษาเขียน</span>' : q.q;
  host.innerHTML=`<div class="qcard">
     <span class="tag ${tag.c}">${tag.t}</span>
     <div class="qtext">${prompt}</div>
     <div class="opts">${optsHtml}</div>
     <div class="note" id="note">${q.note||''}</div>
     <div class="expl" id="expl"></div>
     <button class="next" id="next" onclick="next()">${idx+1>=total?'ดูคะแนน 🎉':'ข้อต่อไป ›'}</button>
   </div>`;
  if(!q.note) document.getElementById('note').textContent='';
  window.scrollTo(0,0);
}
function pick(i){
  const q=qs[idx]; if(q.done) return; q.done=true;
  const opts=[...document.querySelectorAll('.opt')];
  opts.forEach(o=>o.classList.add('locked'));
  const chosen=opts[i], correct=opts[q.ans];
  correct.classList.add('correct'); correct.querySelector('.mark').textContent='✓';
  if(i===q.ans){ score++; }
  else { chosen.classList.add('wrong'); chosen.querySelector('.mark').textContent='✕'; }
  const note=document.getElementById('note');
  if(q.note){ note.textContent='💡 '+q.note; note.classList.add('show'); }
  else if(q.type===2 && q.answer_text && q.answer_text.includes('/')){
    note.textContent='💡 ตอบได้หลายแบบ: '+q.answer_text; note.classList.add('show');
  }
  const expl=document.getElementById('expl');
  if(q.expl){ expl.innerHTML='<b>เฉลย:</b> '+q.expl; expl.classList.add('show'); }
  document.getElementById('next').classList.add('show');
}
function next(){ idx++; render(); }
function showResult(){
  document.getElementById('prog').style.width='100%';
  scores[cur.set]=score;
  const total=qs.length, pct=Math.round(score/total*100);
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='เก่งมากเลย! สุดยอด';}
  else if(pct>=75){emoji='🌟';msg='เยี่ยมมาก ทำได้ดีจริง ๆ';}
  else if(pct>=50){emoji='💪';msg='ดีแล้ว ลองทบทวนข้อที่ผิดอีกนิด';}
  else {emoji='📚';msg='ไม่เป็นไร ลองอีกครั้งนะ เก่งขึ้นแน่นอน';}
  document.getElementById('qhost').innerHTML=`<div class="result">
    <div class="emoji">${emoji}</div>
    <h2>ชุดที่ ${cur.set} เสร็จแล้ว!</h2>
    <div class="ring">${score} / ${total}</div>
    <div class="msg">${msg} (${pct}%)</div>
    <div class="rbtns">
      <button class="rbtn ghost" onclick="startSet(${cur.set})">ทำซ้ำ 🔁</button>
      <button class="rbtn primary" onclick="goHome()">เลือกชุดอื่น ›</button>
    </div></div>`;
}
buildSets();
</script>
